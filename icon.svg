<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Tape colour -->
    <style>
      .tape-body { fill: none; stroke: #c8c0a8; stroke-linecap: butt; }
      .tape-line  { fill: none; stroke: #8a8060; stroke-linecap: butt; }
      .tape-bar   { stroke: #6a6040; stroke-linecap: butt; }
      .tape-bar-hi{ stroke: #ffaa00; stroke-linecap: butt; }
    </style>

    <!-- LEFT CURL spine: exits box-left at (146,369), loops up and back -->
    <!-- RIGHT CURL spine: exits box-right at (366,369), loops down and back -->

    <!-- Clip to hide tape where it goes behind the box body -->
    <clipPath id="outside-left">
      <rect x="0" y="0" width="146" height="512"/>
    </clipPath>
    <clipPath id="outside-right">
      <rect x="366" y="0" width="146" height="512"/>
    </clipPath>
    <clipPath id="inside-box">
      <rect x="100" y="340" width="312" height="60"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a0a14"/>

  <!-- ── TAPE ── drawn as stroked paths on a shared spine ── -->

  <!-- LEFT CURL spine (centre of tape width):
       exits at (146,369), curves left, flicks up — one gentle S -->
  <!-- RIGHT CURL spine:
       exits at (366,369), curves right, flicks down -->

  <!-- Tape body (thick stroke = tape width ~20px) -->
  <!-- Straight section -->
  <line x1="146" y1="369" x2="366" y2="369" class="tape-body" stroke-width="22"/>

  <!-- Left curl: gentle outward loop upward -->
  <path d="M146,369 C 110,369 74,356 62,330 C 52,308 66,288 86,292 C 102,296 104,314 92,322"
        class="tape-body" stroke-width="22"/>

  <!-- Right curl: gentle outward loop downward -->
  <path d="M366,369 C 402,369 436,382 450,406 C 460,426 448,446 428,442 C 412,438 408,420 420,412"
        class="tape-body" stroke-width="22"/>

  <!-- Interior lines (3 horizontal stripes across the tape, offset from centre) -->
  <!-- Straight section lines -->
  <line x1="146" y1="363" x2="366" y2="363" class="tape-line" stroke-width="1.2"/>
  <line x1="146" y1="369" x2="366" y2="369" class="tape-line" stroke-width="1.2"/>
  <line x1="146" y1="375" x2="366" y2="375" class="tape-line" stroke-width="1.2"/>

  <!-- Left curl lines — same paths, offset slightly to simulate 3 stripes -->
  <path d="M146,363 C 110,363 74,350 62,324 C 52,302 66,282 86,286 C 102,290 104,308 92,316"
        class="tape-line" stroke-width="1.2"/>
  <path d="M146,369 C 110,369 74,356 62,330 C 52,308 66,288 86,292 C 102,296 104,314 92,322"
        class="tape-line" stroke-width="1.2"/>
  <path d="M146,375 C 110,375 74,362 62,336 C 52,314 66,294 86,298 C 102,302 104,320 92,328"
        class="tape-line" stroke-width="1.2"/>

  <!-- Right curl lines -->
  <path d="M366,363 C 402,363 436,376 450,400 C 460,420 448,440 428,436 C 412,432 408,414 420,406"
        class="tape-line" stroke-width="1.2"/>
  <path d="M366,369 C 402,369 436,382 450,406 C 460,426 448,446 428,442 C 412,438 408,420 420,412"
        class="tape-line" stroke-width="1.2"/>
  <path d="M366,375 C 402,375 436,388 450,412 C 460,432 448,452 428,448 C 412,444 408,426 420,418"
        class="tape-line" stroke-width="1.2"/>

  <!-- Bar marks — vertical ticks across tape width on straight section -->
  <line x1="172" y1="358" x2="172" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="198" y1="358" x2="198" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="224" y1="358" x2="224" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="250" y1="358" x2="250" y2="380" class="tape-bar-hi" stroke-width="2.5"/>
  <line x1="276" y1="358" x2="276" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="302" y1="358" x2="302" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="328" y1="358" x2="328" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="354" y1="358" x2="354" y2="380" class="tape-bar" stroke-width="1.8"/>

  <!-- Note dots on straight section -->
  <circle cx="185" cy="364" r="2.8" fill="#6a6040"/>
  <circle cx="211" cy="372" r="2.8" fill="#6a6040"/>
  <circle cx="237" cy="364" r="2.8" fill="#6a6040"/>
  <circle cx="263" cy="372" r="2.8" fill="#6a6040"/>
  <circle cx="289" cy="365" r="2.8" fill="#6a6040"/>
  <circle cx="315" cy="370" r="2.8" fill="#6a6040"/>
  <circle cx="341" cy="373" r="2.8" fill="#6a6040"/>

  <!-- Metronome body over tape (redrawn on top to clip tape at slot edges) -->
  <path d="M124 444 L174 108 L338 108 L388 444 Z" fill="#1a1a2e" stroke="#4a4a7a" stroke-width="9"/>
  <!-- Slot cut-out (reveal tape) — punch hole back through body -->
  <rect x="146" y="357" width="220" height="24" fill="#c8c0a8"/>
  <!-- Redraw interior lines over slot -->
  <line x1="146" y1="363" x2="366" y2="363" class="tape-line" stroke-width="1.2"/>
  <line x1="146" y1="369" x2="366" y2="369" class="tape-line" stroke-width="1.2"/>
  <line x1="146" y1="375" x2="366" y2="375" class="tape-line" stroke-width="1.2"/>
  <line x1="172" y1="358" x2="172" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="198" y1="358" x2="198" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="224" y1="358" x2="224" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="250" y1="358" x2="250" y2="380" class="tape-bar-hi" stroke-width="2.5"/>
  <line x1="276" y1="358" x2="276" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="302" y1="358" x2="302" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="328" y1="358" x2="328" y2="380" class="tape-bar" stroke-width="1.8"/>
  <line x1="354" y1="358" x2="354" y2="380" class="tape-bar" stroke-width="1.8"/>
  <circle cx="185" cy="364" r="2.8" fill="#6a6040"/>
  <circle cx="211" cy="372" r="2.8" fill="#6a6040"/>
  <circle cx="237" cy="364" r="2.8" fill="#6a6040"/>
  <circle cx="263" cy="372" r="2.8" fill="#6a6040"/>
  <circle cx="289" cy="365" r="2.8" fill="#6a6040"/>
  <circle cx="315" cy="370" r="2.8" fill="#6a6040"/>
  <circle cx="341" cy="373" r="2.8" fill="#6a6040"/>
  <!-- Slot aperture lines -->
  <line x1="146" y1="357" x2="366" y2="357" stroke="#4a4a7a" stroke-width="2"/>
  <line x1="146" y1="381" x2="366" y2="381" stroke="#4a4a7a" stroke-width="2"/>

  <!-- Base (on top) -->
  <path d="M112 444 L400 444 L413 478 L99 478 Z" fill="#1a1a2e" stroke="#4a4a7a" stroke-width="9"/>

  <!-- Read-head: gold triangle -->
  <polygon points="250,345 242,357 258,357" fill="#ffaa00"/>

  <!-- ── Pendulum — angled right ── -->
  <circle cx="256" cy="332" r="6" fill="#ffaa00"/>
  <line x1="256" y1="332" x2="306" y2="132" stroke="#00ccff" stroke-width="5" stroke-linecap="round"/>
  <!-- Trapezoidal weight, perpendicular to rod, broad at top -->
  <polygon points="269,218 298,226 284,258 266,254" fill="#00ccff" opacity="0.95"/>
</svg>
