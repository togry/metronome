name: Deploy

on:
  push:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Set base path
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "VITE_BASE_PATH=/metronome/" >> $GITHUB_ENV
          else
            BRANCH="${{ github.ref_name }}"
            # Sanitize branch name for use in URL
            SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "VITE_BASE_PATH=/metronome/preview/${SAFE_BRANCH}/" >> $GITHUB_ENV
          fi

      - name: Install rsvg-convert
        run: sudo apt-get install -y librsvg2-bin

      - run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ github.ref_name == 'main' && '.' || format('preview/{0}', github.ref_name) }}
          keep_files: true  # prevents branches from wiping each other
