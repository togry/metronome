l ha og trykk spill."],exampleKey:"practice"},{h:"Taktskilletegn",body:["  |  eller  :  Vanlig taktstrek (standard)","  |:           Start repetisjon"," :|            Slutt repetisjon (spilles to ganger)","  |:|          Repetisjon av en enkelt takt","  ||           Dobbel taktstrek; siste avslutter stykket","  ||:          Dobbel taktstrek + start repetisjon"," :||           Slutt repetisjon + dobbel taktstrek","For å starte en ny repetisjon rett etter en lukket, bruk","  :| på siste takt i første repetisjon, deretter","  |: på første takt i neste repetisjon.","Uten || gjentar stykket fra t.1 (øvingssløyfe)."]},{h:"DC / DS al Fine / al Coda",body:["DC al Fine    Om igjen fra start; stopp ved Fine","DC al Coda    Om igjen fra start; ved @ hopp til Coda","DS al Fine    Om igjen fra $ (segno); stopp ved Fine","DS al Coda    Om igjen fra til $; ved @ hopp til Coda","Plasser $ (segno) og @ (coda-merke) på de aktuelle taktlinjene.","Coda-seksjonen spilles ikke før repetisjon."],exampleKey:"structure"},{h:"Rit / Accel",body:["Legg til 'rit' eller 'accel' med et sluttempo for en jevn","tempokurve. Strekker seg til neste tempomarkering eller 'a tempo'.","  4| rit 1/4=60         rit denne takten ned til 60 slag/min","  5| a tempo            tilbake til forrige tempo","  8| 1/4=100 rit 1/4=60 nytt grunntempo, deretter rit"," 12| 1/4=60            ankomst; rit fordeles over t.8-11","Tempo interpoleres jevnt på hvert slag."],exampleKey:"rit"},{h:"Tupletter og rytmemønstre",body:["En tuplettgruppe strekker seg over N pulsslag og deler spennet","i div like deler, som kombineres til noter og pauser:","  N[div:slots]","  N      = pulsslag som tupletten strekker seg over (standard: 1)","  div    = antall like deler spennet deles i","  slots  = hvordan delene kombineres: siffer og punktum summerer til div,","           siffer = note (varighet i deler), . = pause (én del)","","Eksempler:","  [3:21]        triol: lang + kort (swingfølelse)","  [3:111]       åttendedelstriol over 1 slag
