  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Parser ───────────────────────────────────────────────────────────────────

// ─── Score line separator tokens ─────────────────────────────────────────────
// Accepted separators between measure number and content:
//   :        normal barline
//   |        normal barline (alternative)
//   |:       open repeat
//   :|       close repeat
//   ||       double barline (section boundary; last one ends score)
//   ||:      double barline + open repeat
//   :||      close repeat + double barline
//   :|:      close repeat + open repeat (back-to-back repeated sections, no gap)
//   :||:     close repeat + double barline + open repeat
// Bracketed measure number [N] still supported with any separator.

function parseScore(text) {
  const lines = text.split("\n")
    .map(l => l.replace(/\s*(\/\/|#).*$/, "").trim())
    .filter(l => l);

  // SEP_RE: optional bracket open, digits, optional bracket close, separator, rest
  // Separator pattern captures the full barline token between number and content.
  const SEP_RE = /^(\[?)(\d+)(\]?)\s*(\|:\||:\|\||\|\|:|\|:|:\||\|\||[:|])\s*(.*)$/;

  const rawEvents = []; // one per parsed line, in file order

  for (const line of lines) {
    const m = line.match(SEP_RE);
    if (!m) continue;
    const bracketed = m[1] === "[" && m[3] === "]";
    const measure   = parseInt(m[2]);
    const sep       = m[4];
    const rest      = m[5].trim();

    const ev = { measure, sep };

    // Bracketed number is an implicit rehearsal mark
    if (bracketed) ev.rehearsal = String(measure);

    // Inline rehearsal mark [X]
    let remaining = rest;
    const rehM = remaining.match(/^\[([^\]]+)\]/);
    if (rehM) { ev.rehearsal = rehM[1]; remaining = remaining.slice(rehM[0].length).trim(); }

    // || with no other content gives implicit rehearsal mark = measure number
    if ((sep === "||" || sep === ":||" || sep === "||:") && !ev.rehearsal && !remaining) {
      ev.rehearsal = String(measure);
    }

    // Directives (order matters — check multi-word first)
    if      (/^DC\s+al\s+Coda$/i.test(remaining))  { ev.directive = "DC_CODA"; remaining = ""; }
    else if (/^DC\s+al\s+Fine$/i.test(remaining))   { ev.directive = "DC_FINE"; remaining = ""; }
    else if (/^DS\s+al\s+Coda$/i.test(remaining))   { ev.directive = "DS_CODA"; remaining = ""; }
    else if (/^DS\s+al\s+Fine$/i.test(remaining))   { ev.directive = "DS_FINE"; remaining = ""; }
    else if (/^Fine$/i.test(remaining))               { ev.directive = "FINE";    remaining = ""; }
    else if (/^Coda$/i.test(remaining))               { ev.directive = "CODA";    remaining = ""; }

    // Segno $
    if (remaining.startsWith("$")) { ev.segno = true; remaining = remaining.slice(1).trim(); }
    // Coda jump point @
    if (remaining.startsWith("@")) { ev.codaJump = true; remaining = remaining.slice(1).trim(); }

    // Time signature
    const tsM = remaining.match(/(\d+)\/(\d+)(?![.=])/);
    if (tsM) {
      ev.numerator   = parseInt(tsM[1]);
      ev.denominator = parseInt(tsM[2]);
      remaining = remaining.slice(remaining.indexOf(tsM[0]) + tsM[0].length).trim();
    }

    // Grouping
    const grpM = remaining.match(/\(([0-9+]+)\)/);
    if (grpM) {
      ev.grouping = grpM[1].split("+").map(Number);
      remaining = remaining.slice(remaining.indexOf(grpM[0]) + grpM[0].length).trim();
    }

    // Tempo
    const tempoM = remaining.match(/1\/(\d+)(\.?)\s*=\s*(\d+)/);
    if (tempoM) {
      ev.tempoDenom  = parseInt(tempoM[1]);
      ev.tempoDotted = tempoM[2] === ".";
      ev.tempoBPM    = parseInt(tempoM[3]);
    }

    rawEvents.push(ev);
  }

  // Sort by measure number (parser requires strictly increasing, but sort defensively)
  rawEvents.sort((a, b) => a.measure - b.measure);

  // ── Build measure-state map ────────────────────────────────────────────────
  // Collect all structural info per measure number
  const changes   = {};   // measure → state changes
  const barlines  = {};   // measure → sep string
  const directives = {};  // measure → directive string
  const segnos    = {};   // measure → true
  const codaJumps = {};   // measure → true

  let lastDoublebar = null; // last measure with || or :|| → end of score

  for (const ev of rawEvents) {
    const mn = ev.measure;
    barlines[mn] = ev.sep;

    if (ev.directive)  directives[mn] = ev.directive;
    if (ev.segno)      segnos[mn]     = true;
    if (ev.codaJump)   codaJumps[mn]  = true;

    if (ev.sep === "||" || ev.sep === ":||" || ev.sep === "||:")
      lastDoublebar = mn;

    if (!changes[mn]) changes[mn] = {};
    if (ev.rehearsal)   changes[mn].rehearsal   = ev.rehearsal;
    if (ev.numerator)   changes[mn].numerator   = ev.numerator;
    if (ev.denominator) changes[mn].denominator = ev.denominator;
    if (ev.grouping)    changes[mn].grouping    = ev.grouping;
    if (ev.tempoBPM)  {
      changes[mn].tempoDenom  = ev.tempoDenom;
      changes[mn].tempoDotted = ev.tempoDotted || false;
      changes[mn].tempoBPM    = ev.tempoBPM;
    }
  }

  // End of score: last double-barline measure.
  // If no double barline exists, use the last measure defined in the score,
  // and flag it so the scheduler loops back to m.1 automatically.
  const lastDefinedMeasure = Math.max(...Object.keys(changes).map(Number), 1);
  const noExplicitEnd = lastDoublebar === null;
  const endAt = noExplicitEnd ? lastDefinedMeasure : lastDoublebar;

  // ── Forward pass: build measures[] array ──────────────────────────────────
  let state = { numerator: 4, denominator: 4, grouping: null, tempoDenom: 4, tempoDotted: false, tempoBPM: 120 };
  const measures = [];
  const knownGroupings = {};

  for (let mn = 1; mn <= endAt; mn++) {
    if (changes[mn]) {
      const c = changes[mn];
      const newNum = c.numerator   ?? state.numerator;
      const newDen = c.denominator ?? state.denominator;
      let resolvedGrouping;
      if (c.grouping) {
        resolvedGrouping = c.grouping;
        knownGroupings[`${newNum}/${newDen}`] = c.grouping;
      } else {
        resolvedGrouping =
          knownGroupings[`${newNum}/${newDen}`]
          ?? (newNum === state.numerator && newDen === state.denominator ? state.grouping : null);
      }
      state = {
        numerator:   newNum,
        denominator: newDen,
        grouping:    resolvedGrouping,
        tempoDenom:  c.tempoDenom  ?? state.tempoDenom,
        tempoDotted: c.tempoDotted ?? state.tempoDotted,
        tempoBPM:    c.tempoBPM   ?? state.tempoBPM,
        rehearsal:   c.rehearsal  ?? undefined,
      };
    } else {
      state = { ...state, rehearsal: undefined };
    }
    measures[mn] = {
      ...state,
      measureNumber: mn,
      barline:   barlines[mn]   || ":",
      directive: directives[mn] || null,
      segno:     segnos[mn]     || false,
      codaJump:  codaJumps[mn]  || false,
      isEnd:     mn === endAt,
    };
  }

  // ── Build playback sequence ────────────────────────────────────────────────
  // Pre-expand all repeats and DC/DS/Fine/Coda into a flat array of measure numbers.
  // This keeps the scheduler simple: just walk the array.

  // Find structural landmarks
  let segnoAt   = null;
  let codaAt    = null;   // where Coda section starts
  const repeatOpens = {}; // mn → true  (has |: )
  const repeatCloses = {}; // mn → true (has :| )

  for (let mn = 1; mn <= endAt; mn++) {
    const ms = measures[mn];
    if (!ms) continue;
    if (ms.segno)    segnoAt = mn;
    if (ms.directive === "CODA") codaAt = mn;
    const sep = ms.barline;
    if (sep === "|:" || sep === "||:" || sep === "|:|") repeatOpens[mn]  = true;
    if (sep === ":|" || sep === ":||" || sep === "|:|") repeatCloses[mn] = true;
  }

  // Build sequence by simulating playback
  const seq = [];
  let mn = 1;
  let repeatStack = []; // stack of open-repeat measure numbers
  let dcDsActive  = false; // true after a DC/DS jump, suppresses repeat barlines
  let codaMode    = false; // true = skip to Coda
  let fineAt      = null;  // set when a FINE directive is encountered on DC/DS pass

  const MAX_SEQ = 10000; // safety limit

  function addMeasure(n) {
    if (seq.length >= MAX_SEQ) return false;
    seq.push(n);
    return true;
  }

  // We need two passes in some cases (DC/DS), so encapsulate as a walk function
  // that returns the next mn to jump to, or null when done.

  // Simple iterative expansion:
  // Phase 1: walk 1..endAt executing repeat barlines
  // Phase 2: if DC/DS encountered, jump and walk again ignoring repeat barlines,
  //          stopping at Fine or @ (coda jump)

  const openStack = []; // stack of {openMn} for matching :|

  // Find matching |: for each :| (greedy innermost pairing)
  // :|| is a close-repeat only if there is a matching |: open on the stack;
  // otherwise it is just a double-barline end and should not jump back.
  const repeatPairs = {}; // closeMn → openMn
  const warnings = [];     // parse warnings surfaced to user
  let anyRepeatSeen = false;
  {
    const stack = [];
    for (let n = 1; n <= endAt; n++) {
      const sep = (measures[n] || {}).barline || ":";
      // |:| (single-measure repeat): pairs with itself — open AND close on same bar.
      if (sep === "|:|") { repeatPairs[n] = n; anyRepeatSeen = true; continue; }
      // :|| closes only if there is a matching open on the stack.
      const isClose = sep === ":|";
      const isConditionalClose = sep === ":||";
      if (isClose || isConditionalClose) {
        if (stack.length > 0) {
          repeatPairs[n] = stack.pop();
        } else if (isClose) {
          if (anyRepeatSeen) {
            warnings.push("m." + n + ": close-repeat ':|' has no matching open repeat");
          }
          repeatPairs[n] = 1;
        } else {
          // isConditionalClose with empty stack — always an error
          warnings.push("m." + n + ": ':||' has no matching open repeat — use '||' to end the score");
        }
      }
      if (sep === "|:" || sep === "||:") { stack.push(n); anyRepeatSeen = true; }
    }
  }

  // Update isClose check to also use repeatPairs (so :|| without open is not treated as close)
  const isRepeatClose = (sep, n) =>
    sep === ":|" || sep === "|:|" ||
    (sep === ":||" && repeatPairs[n] !== undefined);

  // Walk measures generating the sequence
  // Returns index to continue from after a jump, or -1 when done
  function walk(startMn, endMn, ignoreRepeats, stopAtFine, stopAtCodaJump) {
    // repeatVisited: tracks close-repeat barlines already taken (each fires exactly once)
    const repeatVisited = new Set();
    let n = startMn;
    while (n <= endMn) {
      if (seq.length >= MAX_SEQ) return "done";
      const ms = measures[n];
      if (!ms) { n++; continue; }

      const sep = ms.barline;
      const isClose = !ignoreRepeats && isRepeatClose(sep, n);

      // Always push the measure into the sequence first
      seq.push(n);

      // Handle close-repeat: jump back once
      if (isClose && !repeatVisited.has(n)) {
        repeatVisited.add(n);
        n = repeatPairs[n] ?? 1;
        continue;
      }

      // Stop conditions checked after the measure is played
      if (stopAtFine && ms.directive === "FINE")  return "fine";
      if (stopAtCodaJump && ms.codaJump)          return "coda";

      // DC/DS directives — only active on first pass (ignoreRepeats = second pass)
      if (!ignoreRepeats) {
        const dir = ms.directive;
        if (dir === "DC_FINE" || dir === "DC_CODA") {
          const result = walk(1, endMn, true, dir === "DC_FINE", dir === "DC_CODA");
          if (result === "coda" && codaAt !== null) walk(codaAt, endAt, true, false, false);
          return "done";
        }
        if (dir === "DS_FINE" || dir === "DS_CODA") {
          const from = segnoAt ?? 1;
          const result = walk(from, endMn, true, dir === "DS_FINE", dir === "DS_CODA");
          if (result === "coda" && codaAt !== null) walk(codaAt, endAt, true, false, false);
          return "done";
        }
      }

      if (ms.isEnd) return "done";

      n++;
    }
    return "done";
  }

  // Skip Coda section on first pass: when we hit codaAt during normal walk,
  // jump past it to endAt+1. We handle this by wrapping walk for first pass.
  // Simpler: just do the walk and trim out the Coda section from the first pass.
  // Actually the walk function already handles this implicitly — Coda section
  // will be included on first pass unless we stop before it.
  // The correct behaviour: on first pass, play straight through including Coda
  // only if there is no DC/DS — i.e. if the piece has no DC/DS, Coda is just a
  // labelled section that plays normally.
  // If there IS a DC/DS al Coda, we need to skip Coda on first pass.
  // Detect this:
  const hasDCDS = Object.values(directives).some(d => d === "DC_CODA" || d === "DS_CODA");

  if (hasDCDS && codaAt !== null) {
    // First pass: walk 1..endAt but skip codaAt..endAt, stop before Coda
    walk(1, codaAt - 1, false, false, false);
  } else {
    walk(1, endAt, false, false, false);
  }

  return { measures, seq, endAt, segnoAt, codaAt, warnings, loopScore: noExplicitEnd };
}

// ─── Beat Model ───────────────────────────────────────────────────────────────
//
// Primary groups (in denominator units):
//   2/2        → [1, 1]         (each half = 1 denom unit, denom=2)
//   2/4,3/4,4/4→ [1,1,...] each quarter = 1 denom unit
//   6/8,9/8,12/8 → groups of 3 eighths = dotted quarter
//   odd meters with explicit grouping → use grouping directly
//
// Subdivision target is a note value (denominator of a fraction: 4=quarter, 8=eighth, etc.)
// For a group of N denom-units, we add sub-ticks only if (targetDenom / msDenom * N) is integer.
// i.e. the group must divide evenly into the target note value grid.
//
// Example: 7/8 (2+2+3), target = quarters (4)
//   denom=8, so one denom-unit = 1/8 note.
//   A quarter note = 2 eighth-notes = 2 denom-units.
//   Group of 2: 2/2 = 1 → sub-divide into 1 part (no sub-ticks added — just the primary click)
//   Group of 3: 3/2 = 1.5 → not integer → no subdivision, keep as single click
//
// Example: 7/8 (2+2+3), target = eighths (8)
//   denom=8, so target unit = 1 denom-unit.
//   Group of 2: 2 sub-ticks. Group of 3: 3 sub-ticks.

function getPrimaryGroups(mState) {
  const { numerator, denominator, grouping } = mState;
  if (grouping) return grouping;
  // Compound: 6/8, 9/8, 12/8 → groups of 3
  if (denominator === 8 && numerator % 3 === 0) return Array(numerator / 3).fill(3);
  return Array(numerator).fill(1);
}

// subdivTargetDenom: the note value we want to subdivide to.
//   0  = primary beats only (no subdivision)
//   4  = quarters
//   8  = eighths
//   16 = sixteenths
//   32 = thirty-seconds
//
// For each primary group of size G denom-units:
//   numSubs = G * targetDenom / denominator  (target notes fitting in this group)
//   e.g. 4/4→8ths: G=1, numSubs=1*8/4=2  ✓   7/8 (2+2+3)→4ths: G=3, 3*4/8=1.5→1  ✓
//   If subDivisions is a positive integer > 0, click subDivisions times.
//   Otherwise, click once (the primary beat only).

function getBeatPattern(mState, subdivTargetDenom) {
  const { denominator } = mState;
  const groups = getPrimaryGroups(mState);

  // Build primary-start set (denom-unit index)
  const primaryStarts = new Set();
  let cur = 0;
  for (const g of groups) { primaryStarts.add(cur); cur += g; }

  if (subdivTargetDenom === 0) {
    // Primary beats only — one tick per group
    return groups.map((g, i) => ({
      weight: i === 0 ? 3 : 2,
      durationUnits: g,
    }));
  }

  // How many target-note subdivisions fit in one denom-unit?
  // One denom-unit = 1/denominator note-value.
  // One target note = 1/targetDenom note-value.
  // So one denom-unit = targetDenom/denominator target notes.
  // numSubs for a group of G denom-units = G * targetDenom / denominator.
  // e.g. 4/4 → 8ths: G=1, numSubs = 1 * 8/4 = 2  ✓
  // e.g. 7/8 (2+2+3) → 4ths: G=2, numSubs = 2*4/8 = 1 ✓; G=3, numSubs=1.5 → not int → 1 ✓

  const pattern = [];
  let unitPos = 0;

  groups.forEach((g, gi) => {
    const rawSubs = g * subdivTargetDenom / denominator;
    const numSubs = Number.isInteger(rawSubs) && rawSubs >= 1 ? rawSubs : 1;
    const subDurUnits = g / numSubs; // duration of each sub-tick in denom-units

    for (let s = 0; s < numSubs; s++) {
      const globalUnit = unitPos + s * subDurUnits;
      let weight;
      if (gi === 0 && s === 0)                       weight = 3; // measure downbeat
      else if (s === 0)                               weight = 2; // primary beat (group start)
      else if (Number.isInteger(globalUnit) && primaryStarts.has(Math.round(globalUnit))) weight = 2;
      else                                            weight = 1; // subdivision click
      pattern.push({ weight, durationUnits: subDurUnits });
    }
    unitPos += g;
  });

  return pattern;
}

// Seconds per one denominator unit
function oneDenomUnitSec(mState, tempoScale) {
  const { tempoBPM, tempoDenom, tempoDotted, denominator } = mState;
  // dotted note tempo: one beat = 1.5 × tempoDenom note-values
  const dotFactor = tempoDotted ? 1.5 : 1;
  return (tempoDenom / denominator) * (60 / (tempoBPM * tempoScale * dotFactor));
}

// ─── Timeline helpers ─────────────────────────────────────────────────────────

function getTimelineEvents(measures, endAt) {
  const events = [];
  let prevSig = null;
  const mNums = Object.keys(measures).map(Number).filter(n => n >= 1).sort((a, b) => a - b);
  for (const mn of mNums) {
    const ms = measures[mn];
    if (!ms) continue;
    const sig = `${ms.numerator}/${ms.denominator}|${(ms.grouping || []).join(",")}|${ms.tempoBPM}`;
    if (ms.rehearsal || sig !== prevSig || mn === 1) {
      events.push({
        measure: mn,
        rehearsal: ms.rehearsal,
        numerator: ms.numerator,
        denominator: ms.denominator,
        grouping: ms.grouping,
        tempoBPM: ms.tempoBPM,
        isFine: ms.isEnd,
        directive: ms.directive,
        barline: ms.barline,
        segno: ms.segno,
        codaJump: ms.codaJump,
      });
      prevSig = sig;
    }
  }
  return events;
}
