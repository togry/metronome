// ─── Default score ────────────────────────────────────────────────────────────

const DEFAULT_SCORE = `1|: 4/4, 1/4=90      # |: opens a repeat section
8:| [A]              # :| closes it; rehearsal mark A
9|: $ 7/8 (2+2+3)   # $ = segno; new repeat, odd meter
16:|| [B]             # :|| closes repeat; || marks section boundary; rehearsal mark B
17|: 4/4              # |: opens new repeat section
24:| @               # close repeat; @ = coda jump point on D.S. pass
25| [C] 1/4=120      # new section, faster
32| DS al Coda       # go back to $ (segno), on return jump to @
33| Coda             # coda section starts here
36||                 # end of score (last double barline)`;

// ─── Main Component ───────────────────────────────────────────────────────────

function Metronome() {
  const [theme, setTheme]                   = useState("dark");
  const C = PALETTES[theme];
  const [scoreText, setScoreText]           = useState(DEFAULT_SCORE);
  const [parsed, setParsed]                 = useState(() => parseScore(DEFAULT_SCORE));
  const [playing, setPlaying]               = useState(false);
  const [currentMeasure, setCurrentMeasure] = useState(1);
  const [currentBeat, setCurrentBeat]       = useState(0);
  const [subdivIdx, setSubdivIdx]           = useState(0);
  const [startMeasure, setStartMeasure]     = useState(1);
  const [loopStart, setLoopStart]           = useState(null);
  const [loopEnd, setLoopEnd]               = useState(null);
  const [tempoScale, setTempoScale]         = useState(100);
  const [btLatency, setBtLatency]           = useState(0);   // ms to advance audio for BT headsets
  const [parseError, setParseError]         = useState("");
  const [parseWarnings, setParseWarnings]     = useState([]);
  const [flash, setFlash]                   = useState(null);
  const [showScore, setShowScore]           = useState(false); // mobile score drawer
  const [showHelp, setShowHelp]             = useState(false);
  const [winWidth, setWinWidth]             = useState(800);
  const [winHeight, setWinHeight]           = useState(600);
  const rootRef = useRef(null);
  useEffect(() => {
    if (!rootRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) { setWinWidth(e.contentRect.width); setWinHeight(e.contentRect.height); }
    });
    ro.observe(rootRef.current);
    return () => ro.disconnect();
  }, []);

  // Use 100dvh on iOS Safari (excludes browser chrome); fall back to 100vh
  useEffect(() => {
    if (!rootRef.current) return;
    try {
      rootRef.current.style.height = "100dvh";
    } catch (e) {
      rootRef.current.style.height = "100vh";
    }
  }, []);
  const mobile = winWidth < 768 || winHeight < 500; // phones in landscape: wide but short
  const portrait = mobile && winHeight > winWidth;
  // Which measure to preview in the pattern display (follows timeline hover/click when not playing)
  const [previewMeasure, setPreviewMeasure] = useState(1);
  // Count-in settings
  const [countInEnabled, setCountInEnabled] = useState(false);
  const [countInBeats, setCountInBeats]     = useState(4);   // 2, 3, or 4
  const [countInDenom, setCountInDenom]     = useState(4);   // 4 = quarters, 8 = eighths
  const [countingIn, setCountingIn]         = useState(false); // true while count-in is sounding
  const [countInRemaining, setCountInRemaining] = useState(0); // beats left in count-in

  const audioCtxRef      = useRef(null);
  const schedulerRef     = useRef(null);
  const posRef           = useRef({ seqIdx: 0, tick: 0 }); // seqIdx = index into parsed.seq
  const nextTickTimeRef  = useRef(0);
  const isPlayingRef     = useRef(false);
  const parsedRef        = useRef(parsed);              parsedRef.current = parsed;

  // Compute loop seq-index bounds synchronously.
  // Called from the scheduler so it's always up to date (no useEffect race).
  function computeLoopSeqBounds(seq, loopStartMn, loopEndMn) {
    let s = -1;
    for (let i = 0; i < seq.length; i++) {
      if (seq[i] >= loopStartMn && seq[i] <= loopEndMn) { s = i; break; }
    }
    if (s < 0) return { s: 0, e: 1 };
    let e = s + 1;
    for (let i = s + 1; i < seq.length; i++) {
      if      (seq[i] >= loopStartMn && seq[i] <= loopEndMn) e = i + 1;
      else if (seq[i] < loopStartMn)  break; // wrapped back before loop start
      else                            break; // past loop end
    }
    return { s, e };
  }
  const subdivIdxRef     = useRef(subdivIdx);           subdivIdxRef.current = subdivIdx;
  const tempoScaleRef    = useRef(tempoScale / 100);    tempoScaleRef.current = tempoScale / 100;
  const btLatencyRef     = useRef(btLatency / 1000);    btLatencyRef.current = btLatency / 1000;
  const startMeasureRef  = useRef(startMeasure);        startMeasureRef.current = startMeasure;
  const loopStartRef     = useRef(loopStart);           loopStartRef.current = loopStart;
  const loopEndRef       = useRef(loopEnd);             loopEndRef.current = loopEnd;
  const loopSeqStartRef  = useRef(-1); // seq[] index of first measure in loop
  const loopSeqEndRef    = useRef(0);   // seq[] index one past the last included measure

  const timelineRef       = useRef(null);   // inner content
  const timelineScrollRef = useRef(null);   // scroll container
  const dragStateRef        = useRef(null);
  const lastTapRef          = useRef({ mn: null, time: 0 }); // for double-tap loop on timeline
  const skipPlayEffectRef   = useRef(false);
  const playBtnRef          = useRef(null);
  const countInEnabledRef = useRef(countInEnabled); countInEnabledRef.current = countInEnabled;
  const countInBeatsRef   = useRef(countInBeats);   countInBeatsRef.current = countInBeats;
  const countInDenomRef   = useRef(countInDenom);   countInDenomRef.current = countInDenom;

  // Keep previewMeasure in sync with currentMeasure while playing
  useEffect(() => {
    if (playing) setPreviewMeasure(currentMeasure);
  }, [playing, currentMeasure]);

  function getAudioCtx() {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed")
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtxRef.current.state === "suspended") audioCtxRef.current.resume();
    return audioCtxRef.current;
  }

  const scheduleNext = useCallback(() => {
    const ctx = audioCtxRef.current;
    if (!ctx || !isPlayingRef.current) return;
    const { measures, seq } = parsedRef.current;
    const scheduleUntil = ctx.currentTime + 0.15;

    while (nextTickTimeRef.current < scheduleUntil) {
      const { seqIdx, tick } = posRef.current;
      const loopE = loopEndRef.current;
      const loopS = loopStartRef.current;

      // ── Loop region (user-defined, overrides score structure) ────────────
      if (loopE !== null) {
        const loopStartMn = loopStartRef.current ?? startMeasureRef.current;
        // Recompute bounds if loop params changed since last tick
        if (loopSeqStartRef._loopS !== loopStartMn || loopSeqStartRef._loopE !== loopE) {
          const { s, e } = computeLoopSeqBounds(seq, loopStartMn, loopE);
          loopSeqStartRef.current = s;
          loopSeqEndRef.current   = e;
          loopSeqStartRef._loopS  = loopStartMn;
          loopSeqStartRef._loopE  = loopE;
        }
        if (seqIdx >= loopSeqEndRef.current) {
          posRef.current = { seqIdx: loopSeqStartRef.current, tick: 0 };
          continue;
        }
      }

      // If loop was just cleared, invalidate cache so next loop recomputes fresh
      if (loopE === null) {
        loopSeqStartRef._loopS = undefined;
        loopSeqStartRef._loopE = undefined;
      }

      // ── End of sequence ───────────────────────────────────────────────────
      if (seqIdx >= seq.length) {
        if (parsedRef.current.loopScore) {
          // No explicit end barline — loop the whole score from the beginning
          posRef.current = { seqIdx: 0, tick: 0 };
          continue;
        }
        isPlayingRef.current = false;
        setPlaying(false);
        return;
      }

      const measure = seq[seqIdx];
      const mState = measures[measure];
      if (!mState) { isPlayingRef.current = false; setPlaying(false); return; }

      const targetDenom = SUBDIV_OPTIONS[subdivIdxRef.current].targetDenom;
      const pattern     = getBeatPattern(mState, targetDenom);
      const tickIdx     = tick % pattern.length;
      const tickData    = pattern[tickIdx];
      const t           = nextTickTimeRef.current;

      // Audio click
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      const [freq, vol] =
        tickData.weight === 3 ? [1400, 0.80] :
        tickData.weight === 2 ? [950,  0.60] :
        tickData.weight === 1 ? [700,  0.40] :
                                [460,  0.15];
      osc.frequency.value = freq;
      const tAudio = Math.max(ctx.currentTime, t - btLatencyRef.current);
      g.gain.setValueAtTime(vol, tAudio);
      g.gain.exponentialRampToValueAtTime(0.001, tAudio + 0.05);
      osc.start(tAudio); osc.stop(tAudio + 0.07);

      // UI sync
      const delay = Math.max(0, (t - ctx.currentTime) * 1000);
      const [capM, capT, capW] = [measure, tickIdx, tickData.weight];
      setTimeout(() => {
        setCurrentMeasure(capM);
        setCurrentBeat(capT);
        setFlash(capW >= 3 ? "measure" : capW >= 2 ? "primary" : "unit");
      }, delay);

      if (tick + 1 >= pattern.length) posRef.current = { seqIdx: seqIdx + 1, tick: 0 };
      else posRef.current = { seqIdx, tick: tick + 1 };

      nextTickTimeRef.current += tickData.durationUnits * oneDenomUnitSec(mState, tempoScaleRef.current);
    }
  }, []);

  useEffect(() => {
    if (!playing) {
      clearInterval(schedulerRef.current);
      isPlayingRef.current = false;
      setCountingIn(false);
      setCountInRemaining(0);
      return;
    }
    // Count-in path already set up the scheduler — don't double-start
    if (skipPlayEffectRef.current) {
      skipPlayEffectRef.current = false;
      return () => clearInterval(schedulerRef.current);
    }
    const ctx = getAudioCtx();
    nextTickTimeRef.current = ctx.currentTime + 0.05;
    isPlayingRef.current = true;
    scheduleNext();
    schedulerRef.current = setInterval(scheduleNext, 50);
    return () => clearInterval(schedulerRef.current);
  }, [playing, scheduleNext]);

  function handlePlay() {
    if (playing) { setPlaying(false); return; }

    const ctx = getAudioCtx();
    const realStart = Math.max(1, startMeasure);
    const { seq } = parsedRef.current;
    const startSeqIdx = Math.max(0, seq.findIndex(mn => mn >= realStart));
    posRef.current = { seqIdx: startSeqIdx, tick: 0 };
    setCurrentMeasure(seq[startSeqIdx] ?? realStart);
    setPreviewMeasure(seq[startSeqIdx] ?? realStart);
    setCurrentBeat(0);
    setFlash(null);

    // Schedule count-in if enabled
    if (countInEnabledRef.current) {
      const { measures } = parsedRef.current;
      const mState = measures[realStart] || measures[1];
      const scale = tempoScaleRef.current;
      // Duration of one count-in beat in seconds
      const ciDenom = countInDenomRef.current; // 4 or 8
      const ciBeats = countInBeatsRef.current; // 2,3,4
      // Use the measure's tempo: tempoBPM beats of 1/tempoDenom per minute
      const { tempoBPM, tempoDenom, tempoDotted } = mState;
      const oneBeatSec = (tempoDenom / ciDenom) * (60 / (tempoBPM * scale)); // count-in uses plain quarters/eighths

      const startT = ctx.currentTime + 0.05;
      setCountingIn(true);
      setCountInRemaining(ciBeats);

      for (let i = 0; i < ciBeats; i++) {
        const t = startT + i * oneBeatSec;
        // Schedule click
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        // First beat higher pitch
        osc.frequency.value = i === 0 ? 1400 : 1000;
        g.gain.setValueAtTime(i === 0 ? 0.7 : 0.5, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.06);

        // UI: show count-in beat number
        const capRemaining = ciBeats - i;
        setTimeout(() => {
          setCountingIn(true);
          setCountInRemaining(capRemaining);
          setFlash(i === 0 ? "measure" : "primary");
        }, Math.max(0, (t - ctx.currentTime) * 1000));
      }

      // Schedule end of count-in + start of score
      const scoreStartT = startT + ciBeats * oneBeatSec;
      setTimeout(() => {
        setCountingIn(false);
        setCountInRemaining(0);
      }, Math.max(0, (scoreStartT - ctx.currentTime) * 1000));

      // Start scheduler from scoreStartT
      nextTickTimeRef.current = scoreStartT;
      isPlayingRef.current = true;
      scheduleNext();
      schedulerRef.current = setInterval(scheduleNext, 50);
      // Mark as playing (use a flag to skip the useEffect double-start)
      skipPlayEffectRef.current = true;
      setPlaying(true);
    } else {
      setPlaying(true);
    }
  }

  function handleParse() {
    try {
      const p = parseScore(scoreText);
      setParsed(p);
      setParseError("");
      setParseWarnings(p.warnings || []);
      setStartMeasure(1);
      setPreviewMeasure(1);
      setLoopStart(null);
      setLoopEnd(null);
    } catch (e) { setParseError(e.message); }
  }

  // ── Timeline ──────────────────────────────────────────────────────────────

  const { measures, seq, endAt } = parsed;
  const totalMeasures = endAt ?? Object.values(measures).filter(Boolean).length;
  const totalMeasuresRef = useRef(0); totalMeasuresRef.current = totalMeasures;
  const MIN_PX_PER_MEASURE = 22;
  const timelineContentWidth = Math.max(totalMeasures * MIN_PX_PER_MEASURE, 200);
  const measPx = (mn) => Math.round(((mn - 1) / Math.max(1, totalMeasures - 1)) * (timelineContentWidth - 1));
  const measPct = (mn) => ((mn - 1) / Math.max(1, totalMeasures - 1)) * 100;

  function measureFromX(x) {
    const scrollEl = timelineScrollRef.current;
    const rect = scrollEl.getBoundingClientRect();
    const px = (x - rect.left) + scrollEl.scrollLeft;
    const frac = Math.max(0, Math.min(1, px / Math.max(1, timelineContentWidth - 1)));
    return Math.max(1, Math.min(totalMeasures, Math.round(frac * (totalMeasures - 1)) + 1));
  }

  function handleTimelineMouseDown(e) {
    e.preventDefault();
    const mn = measureFromX(e.clientX);
    if (e.shiftKey) {
      if (mn > startMeasure) setLoopEnd(mn);
    } else {
      dragStateRef.current = { anchorMn: mn };
      setStartMeasure(mn);
      setPreviewMeasure(mn);
      setLoopStart(null);
      setLoopEnd(null);
      // Reposition playback immediately if playing
      if (isPlayingRef.current) {
        const { seq: s } = parsedRef.current;
        const newIdx = Math.max(0, s.findIndex(m => m >= mn));
        posRef.current = { seqIdx: newIdx, tick: 0 };
        setCurrentMeasure(s[newIdx] ?? mn);
        setCurrentBeat(0);
      }
    }
  }

  function handleTimelineMouseMove(e) {
    if (!dragStateRef.current) return;
    const { anchorMn } = dragStateRef.current;
    const mn = measureFromX(e.clientX);
    if (mn !== anchorMn) {
      const lo = Math.min(anchorMn, mn);
      const hi = Math.max(anchorMn, mn);
      setStartMeasure(lo);
      setPreviewMeasure(lo);
      setLoopStart(lo);
      setLoopEnd(hi);
    }
  }

  function handleTimelineMouseUp() {
    dragStateRef.current = null;
  }

  function handleTimelineTouchStart(e) {
    // Two-finger touch = scroll — don't intercept, let the container pan
    if (e.touches.length >= 2) {
      dragStateRef.current = null;
      return;
    }
    const touch = e.touches[0];
    const mn = measureFromX(touch.clientX);
    const now = Date.now();
    const last = lastTapRef.current;
    const isDoubleTap = last.mn !== null && now - last.time < 350;

    if (isDoubleTap) {
      // Double-tap: enter loop-definition mode anchored at the tapped measure
      lastTapRef.current = { mn: null, time: 0 }; // consume the double-tap
      dragStateRef.current = { anchorMn: mn, startX: touch.clientX, loopMode: true, confirmed: false };
      // Set the loop anchor immediately
      setLoopStart(mn);
      setLoopEnd(mn);
    } else {
      // Single tap / start of drag: just record position, decide on end
      lastTapRef.current = { mn, time: now };
      dragStateRef.current = { anchorMn: mn, startX: touch.clientX, startY: touch.clientY, loopMode: false, confirmed: false };
    }
  }

  function handleTimelineTouchMove(e) {
    // Two-finger = scroll; release control
    if (e.touches.length >= 2) {
      dragStateRef.current = null;
      return;
    }
    if (!dragStateRef.current) return;
    const touch = e.touches[0];
    const { anchorMn, startX, startY, loopMode, confirmed } = dragStateRef.current;

    if (loopMode) {
      // Double-tap drag: define loop freely, prevent scroll
      e.preventDefault();
      const mn = measureFromX(touch.clientX);
      const lo = Math.min(anchorMn, mn);
      const hi = Math.max(anchorMn, mn);
      setLoopStart(lo);
      setLoopEnd(hi);
      setStartMeasure(lo);
      setPreviewMeasure(lo);
      dragStateRef.current.confirmed = true;
      return;
    }

    // Single-finger: don't intercept — let native scroll handle it.
    // We'll commit the tap action on touchend only if there was no significant movement.
    const dx = Math.abs(touch.clientX - startX);
    const dy = Math.abs(touch.clientY - (startY ?? touch.clientY));
    if (dx > 8 || dy > 8) {
      // Movement detected — cancel the tap, let browser scroll
      dragStateRef.current = null;
    }
  }

  function handleTimelineTouchEnd(e) {
    if (!dragStateRef.current) return;
    const { anchorMn, loopMode, confirmed } = dragStateRef.current;
    if (!loopMode && !confirmed) {
      // Clean tap: set start position, clear loop
      setStartMeasure(anchorMn);
      setPreviewMeasure(anchorMn);
      setLoopStart(null);
      setLoopEnd(null);
      if (isPlayingRef.current) {
        const { seq: s } = parsedRef.current;
        const newIdx = Math.max(0, s.findIndex(mn => mn >= anchorMn));
        posRef.current = { seqIdx: newIdx, tick: 0 };
        setCurrentMeasure(s[newIdx] ?? anchorMn);
        setCurrentBeat(0);
      }
    }
    dragStateRef.current = null;
  }

  useEffect(() => {
    window.addEventListener("mousemove", handleTimelineMouseMove);
    window.addEventListener("mouseup", handleTimelineMouseUp);
    return () => {
      window.removeEventListener("mousemove", handleTimelineMouseMove);
      window.removeEventListener("mouseup", handleTimelineMouseUp);
    };
  }, [playing, startMeasure]);

  // Auto-scroll timeline to keep playhead / start marker in view
  useEffect(() => {
    const scrollEl = timelineScrollRef.current;
    if (!scrollEl) return;
    const targetMn = playing ? currentMeasure : startMeasure;
    const px = measPx(targetMn);
    const vw = scrollEl.clientWidth;
    const sl = scrollEl.scrollLeft;
    const margin = Math.max(40, vw * 0.2);
    if (px < sl + margin)          scrollEl.scrollLeft = Math.max(0, px - margin);
    else if (px > sl + vw - margin) scrollEl.scrollLeft = px - vw + margin;
  }, [currentMeasure, startMeasure, playing]);

  // Keyboard navigation: ←/→ to move measure, Shift+←/→ to set loop region
  useEffect(() => {
    function handleKeyDown(e) {
      // Don't intercept when typing in score editor or any input/textarea
      const tag = document.activeElement?.tagName;
      if (tag === "TEXTAREA" || tag === "INPUT" || tag === "SELECT") return;
      if (e.key === " " || e.key === "Spacebar") {
        e.preventDefault();
        if (isPlayingRef.current) {
          setPlaying(false);
        } else {
          // handlePlay() would be stale here — trigger a click on the play button instead
          playBtnRef.current?.click();
        }
        return;
      }
      if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
      e.preventDefault();
      const total     = totalMeasuresRef.current;
      const cur       = startMeasureRef.current;
      const loopE     = loopEndRef.current;
      const loopS     = loopStartRef.current;
      const dir       = e.key === "ArrowRight" ? 1 : -1;
      if (e.shiftKey) {
        // Shift+arrow: define or adjust a loop.
        // The current measure (cur) is always the anchor; shift+arrow sets the other endpoint.
        // If a loop is already defined from this same anchor, extend or shrink it.
        // If cur is outside the existing loop (navigated away), clear and start a fresh one.
        const loopIsFromHere = loopE !== null && loopS === cur;
        if (loopIsFromHere) {
          // Adjust the far end of the existing loop
          const newEnd = Math.max(cur + 1, Math.min(total, loopE + dir));
          setLoopEnd(newEnd);
        } else {
          // Fresh loop anchored at cur — the other endpoint is one step in dir
          const far = Math.max(1, Math.min(total, cur + dir));
          if (far !== cur) {
            const lo = Math.min(cur, far);
            const hi = Math.max(cur, far);
            setLoopStart(lo);
            setLoopEnd(hi);
          }
        }
      } else {
        // Plain arrow: move cursor (startMeasure). Loop is left completely untouched.
        const newMn = Math.max(1, Math.min(total, cur + dir));
        setStartMeasure(newMn);
        setPreviewMeasure(newMn);
        if (isPlayingRef.current) {
          const { seq: s } = parsedRef.current;
          const newIdx = Math.max(0, s.findIndex(mn => mn >= newMn));
          posRef.current = { seqIdx: newIdx, tick: 0 };
          setCurrentMeasure(s[newIdx] ?? newMn);
          setCurrentBeat(0);
        }
      }
    }
    window.addEventListener("keydown", handleKeyDown);
    return () => window.removeEventListener("keydown", handleKeyDown);
  }, []);

  // ── Derived display ───────────────────────────────────────────────────────

  const timelineEvents = getTimelineEvents(measures, endAt);
  const targetDenom    = SUBDIV_OPTIONS[subdivIdx].targetDenom;
  const previewMs      = measures[previewMeasure] || measures[startMeasure] || measures[1];
  const previewPattern = previewMs ? getBeatPattern(previewMs, targetDenom) : [];
  const activeBeat     = playing && previewMeasure === currentMeasure ? currentBeat : -1;

  // Last rehearsal mark at or before the displayed measure (always defined once any RM exists)
  const dispMn = playing ? currentMeasure : previewMeasure;
  let lastRM = null;
  for (let m = dispMn; m >= 1; m--) {
    if (measures[m]?.rehearsal) { lastRM = { mark: measures[m].rehearsal, atCurrent: m === dispMn }; break; }
  }

  const flashColors = { measure: C.measure, primary: C.primary, unit: C.unit };

  // ── Render ────────────────────────────────────────────────────────────────

  const selectStyle = {
    background: C.bgDark, border: `1px solid ${C.border}`, color: C.text,
    padding: mobile ? "8px 10px" : "6px 10px", fontFamily: "monospace",
    fontSize: mobile ? 14 : 12, borderRadius: 3, outline: "none", cursor: "pointer",
  };

  const scorePanel = (
    <div style={{
      ...(mobile ? {
        position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
        zIndex: 100, display: "flex", flexDirection: "column",
        background: C.bgMid,
      } : {
        width: 270, borderRight: `1px solid ${C.border}`, flexShrink: 0,
        display: "flex", flexDirection: "column",
        background: C.bgMid,
      }),
      padding: 14, gap: 10,
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontSize: 9, letterSpacing: 3, color: C.textFaint }}>SCORE</div>
        {mobile && (
          <button onClick={() => setShowScore(false)} style={{
            background: "transparent", border: `1px solid ${C.border}`,
            color: C.textDim, padding: "4px 10px", cursor: "pointer",
            borderRadius: 3, fontSize: 12,
          }}>✕ CLOSE</button>
        )}
      </div>
      <textarea value={scoreText} onChange={e => setScoreText(e.target.value)} style={{
        flex: 1, background: C.bgDark, border: `1px solid ${C.border}`, borderRadius: 4,
        color: C.code, fontFamily: "monospace", fontSize: mobile ? 14 : 12.5,
        padding: 10, resize: "none", outline: "none", lineHeight: 2,
        WebkitAppearance: "none",
      }} />
      {parseError && <div style={{ color: "#ff6666", fontSize: 11 }}>{parseError}</div>}
      {parseWarnings.map((w, i) => <div key={i} style={{ color: C.primary, fontSize: 11 }}>⚠ {w}</div>)}
      <button onClick={() => { handleParse(); if (mobile) setShowScore(false); }} style={{
        background: C.greenDim, border: `1px solid #336644`, color: C.green,
        padding: mobile ? "12px" : "7px 12px", cursor: "pointer", borderRadius: 3,
        letterSpacing: 2, fontSize: mobile ? 14 : 11, fontFamily: "monospace",
      }}>PARSE SCORE</button>

      {!mobile && <>
        <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>
          <div style={{ fontSize: 9, letterSpacing: 3, color: C.textFaint, marginBottom: 8 }}>LEGEND</div>
          {[
            { color: C.measure, label: "Measure downbeat" },
            { color: C.primary, label: "Primary beat" },
            { color: C.unit,    label: "Subdivision click" },
          ].map(({ color, label }) => (
            <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
              <div style={{ width: 9, height: 9, borderRadius: "50%", background: color, flexShrink: 0 }} />
              <span style={{ fontSize: 11, color: C.textDim }}>{label}</span>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 10, color: C.textFaint, lineHeight: 1.7, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>
          <span style={{ color: C.textDim }}>Format: </span>
          m: [mark] N/D (g+r+p) 1/D=BPM
        </div>
      </>}
    </div>
  );

  return (
    <div ref={rootRef} style={{
      height: "100vh", background: C.bg, color: C.text,
      fontFamily: "'Courier New', monospace",
      display: "flex", flexDirection: "column", userSelect: "none",
      overflow: "hidden",
    }}>

      {/* ── Header ── */}
      <div style={{
        borderBottom: `1px solid ${C.border}`,
        padding: mobile ? "10px 14px" : "12px 22px",
        display: "flex", alignItems: "center", gap: 10,
        background: C.bgMid, flexShrink: 0,
      }}>
        {mobile && (
          <button onClick={() => setShowScore(true)} style={{
            background: "transparent", border: `1px solid ${C.border}`,
            color: C.code, padding: "6px 10px", cursor: "pointer",
            borderRadius: 3, fontSize: 12, letterSpacing: 1,
          }}>SCORE</button>
        )}
        <div style={{ fontSize: mobile ? 14 : 17, letterSpacing: 4, color: C.gold, fontWeight: "bold" }}>♩ CONDUCTOR</div>
        {!mobile && <div style={{ fontSize: 9, color: C.textFaint, letterSpacing: 3 }}>SCORE-AWARE METRONOME</div>}
        <button
          onClick={() => setTheme(t => t === "dark" ? "light" : "dark")}
          title={theme === "dark" ? "Switch to daylight palette" : "Switch to night palette"}
          style={{
            background: theme === "dark" ? "transparent" : C.borderHi,
            border: `1px solid ${C.border}`,
            color: theme === "dark" ? C.primary : C.bg,
            borderRadius: 4,
            padding: "4px 8px",
            cursor: "pointer",
            fontSize: 14,
            lineHeight: 1,
            marginLeft: mobile ? 4 : 8,
          }}
        >{theme === "dark" ? "☀" : "🌙"}</button>

        {/* ? help button */}
        <button
          onClick={() => setShowHelp(true)}
          title="Help"
          style={{
            background: "transparent",
            border: `1px solid ${C.border}`,
            color: C.textDim,
            borderRadius: "50%",
            width: 26, height: 26,
            cursor: "pointer",
            fontSize: 13,
            lineHeight: 1,
            marginLeft: mobile ? 4 : 8,
            flexShrink: 0,
          }}
        >?</button>

        <div style={{ marginLeft: "auto", display: "flex", gap: mobile ? 8 : 10, alignItems: "center" }}>
          {[
            { key: "measure", col: C.measure, label: "MEAS" },
            { key: "primary", col: C.primary, label: "BEAT" },
            { key: "unit",    col: C.unit,    label: "UNIT" },
          ].map(({ key, col, label }) => (
            <div key={key} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              {/* Fixed-size outer container so layout never shifts */}
              <div style={{ width: mobile ? 22 : 24, height: mobile ? 22 : 24, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{
                  width:        flash === key ? (mobile ? 20 : 22) : (mobile ? 11 : 13),
                  height:       flash === key ? (mobile ? 20 : 22) : (mobile ? 11 : 13),
                  borderRadius: "50%",
                  background:   flash === key ? col : col + "28",
                  border:       `1px solid ${col}55`,
                  transition:   "all 0.05s",
                  boxShadow:    flash === key ? `0 0 14px ${col}, 0 0 28px ${col}55` : "none",
                }} />
              </div>
              {!mobile && <div style={{ fontSize: 8, color: flash === key ? col : C.textFaint, letterSpacing: 1 }}>{label}</div>}
            </div>
          ))}
        </div>
      </div>

      {/* Mobile score drawer overlay */}
      {mobile && showScore && scorePanel}

      {/* ── Help modal ── */}
      {showHelp && (
        <div
          onClick={() => setShowHelp(false)}
          style={{
            position: "fixed", inset: 0, zIndex: 200,
            background: "rgba(0,0,0,0.7)",
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: 16,
          }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{
              background: C.bgMid, border: `1px solid ${C.borderHi}`,
              borderRadius: 8, maxWidth: 560, width: "100%",
              maxHeight: "85vh", overflowY: "auto",
              padding: 24,
              fontFamily: "'Courier New', monospace",
              color: C.text,
              WebkitOverflowScrolling: "touch",
            }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 15, color: C.gold, letterSpacing: 3, fontWeight: "bold" }}>♩ CONDUCTOR — HELP</div>
              <button onClick={() => setShowHelp(false)} style={{
                background: "transparent", border: `1px solid ${C.border}`,
                color: C.textDim, borderRadius: 4, padding: "4px 10px",
                cursor: "pointer", fontSize: 13,
              }}>✕</button>
            </div>
            {[
              { h: "Score Format", body: [
                "Each line: measure separator [mark] N/D (grouping) 1/note=BPM",
                "All fields except the measure number and separator are optional.",
                "# or // starts a comment — can follow content on the same line.",
                "Bracketed measure number → also becomes rehearsal mark: [12]| 4/4",
                "Separator determines the barline type (see Repeat Notation below).",
              ]},
              { h: "Barline Separators", body: [
                "  |  or  :    Normal barline",
                "  |:          Open repeat",
                "  :|          Close repeat (section plays twice)",
                "  |:|         Single-measure repeat",
                "  ||          Double barline; last one ends the score",
                "  ||:         Double barline + open repeat",
                "  :||         Close repeat + double barline",
                "If no || is present, the score loops back to m.1 continuously.",
              ]},
              { h: "Repeat Notation", body: [
                "DC al Fine    Jump to m.1; stop at Fine",
                "DC al Coda    Jump to m.1; at @ jump to Coda section",
                "DS al Fine    Jump to $ (segno); stop at Fine",
                "DS al Coda    Jump to $; at @ jump to Coda section",
                "Place $ (segno) and @ (coda jump point) on their measure lines.",
                "Coda section is skipped on the first pass; entered only via DC/DS.",
              ]},
              { h: "Time Signatures", body: [
                "Standard: 4/4  3/4  6/8  2/2  12/8",
                "Compound (6/8, 12/8): primary beat = dotted quarter automatically.",
                "Odd meters: add grouping, e.g.  7/8 (2+2+3)  or  5/8 (2+3)",
                "Groupings are remembered per time signature across the score.",
              ]},
              { h: "Tempo", body: [
                "Written as 1/note=BPM.  Examples:",
                "  1/4=120   quarter note = 120 bpm",
                "  1/4.=60   dotted quarter = 60 bpm (compound meters)",
                "Tempo carries forward until the next marking.",
              ]},
              { h: "Playback Controls", body: [
                "▶ / ◼  Play and stop.",
                "COUNT IN  Adds a count-in before playback; choose beats and note value.",
                "SUBDIVIDE  Primary beats only, or subdivided to 4ths / 8ths / 16ths / 32nds.",
                "  Sub-clicks are added only where a beat divides evenly.",
                "TEMPO slider  10–150% of written tempo.",
                "☀ / 🌙  Toggle between dark and daylight palettes.",
              ]},
              { h: "Timeline", body: [
                "Desktop: click → set start · drag → loop region · shift-click → set loop end.",
                "Touch: tap → set start · double-tap then drag → loop region.",
                "Touch: 2-finger drag → scroll timeline horizontally.",
                "Playhead tracks position during playback; click/tap while playing to jump.",
              ]},
              { h: "Loops and Repeats", body: [
                "Loop end is inclusive — loop m.6–9 plays m.6, 7, 8, 9 then wraps.",
                "Repeats fully inside a loop are honoured (play twice per cycle).",
                "Repeats spanning a loop boundary are ignored.",
              ]},
              { h: "Keyboard Shortcuts", body: [
                "← / →  Move start position one measure at a time.",
                "Shift+← / Shift+→  Extend or shrink the loop end point.",
                "  (If no loop is active, Shift+→ starts one from the current measure.)",
                "Keyboard is ignored while typing in the score editor.",
              ]},
              { h: "Measure Grid", body: [
                "Click any cell to set start position.",
                "Active measure highlighted in gold. Loop region in orange.",
                "Tiles show time signature, grouping, and structural markers ($, @).",
                "On mobile, swipe vertically to scroll.",
              ]},
            ].map(({ h, body }) => (
              <div key={h} style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, color: C.gold, letterSpacing: 2, marginBottom: 6, borderBottom: `1px solid ${C.border}`, paddingBottom: 4 }}>{h.toUpperCase()}</div>
                {body.map((line, i) => (
                  <div key={i} style={{ fontSize: 12, color: line.startsWith(" ") || line.startsWith("  ") ? C.code : C.textDim, lineHeight: 1.7, paddingLeft: line.startsWith(" ") ? 12 : 0 }}>
                    {line}
                  </div>
                ))}
              </div>
            ))}
            <div style={{ fontSize: 10, color: C.textFaint, marginTop: 8, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>
              Click outside this panel or press ✕ to close.
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", flex: 1, overflow: "hidden", minHeight: 0, ...(mobile && !portrait ? { overflow: "auto", WebkitOverflowScrolling: "touch" } : {}) }}>

        {/* Desktop score editor */}
        {!mobile && scorePanel}

        {/* ── Main panel ── */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0, minHeight: 0, ...(mobile && !portrait ? { overflow: "visible", minHeight: "unset" } : {}) }}>

          {/* Controls bar */}
          <div style={{
            padding: mobile ? "8px 12px" : "12px 20px",
            borderBottom: `1px solid ${C.border}`,
            display: "flex", gap: mobile ? 8 : 18,
            alignItems: mobile ? "center" : "flex-end",
            flexWrap: mobile ? "nowrap" : "wrap",
            background: C.bgMid, flexShrink: 0,
            ...(mobile && !portrait ? { flexWrap: "wrap" } : {}),
          }}>
            {/* Play/stop */}
            <button ref={playBtnRef} onClick={handlePlay} style={{
              background: playing ? C.redDim : C.greenDim,
              border: `2px solid ${playing ? C.red : C.green}`,
              color: countingIn ? C.gold : playing ? (theme === "light" ? C.red : "#ff8888") : C.green,
              padding: mobile ? "12px 18px" : "9px 22px",
              cursor: "pointer", borderRadius: 4,
              fontSize: mobile ? 16 : 13, letterSpacing: 3,
              fontFamily: "monospace", minWidth: mobile ? 90 : 100,
              flexShrink: 0,
            }}>
              {countingIn ? `${countInRemaining}…` : playing ? "◼" : "▶"}
            </button>

            {/* Count-in controls */}
            <div style={{
              display: "flex", flexDirection: "column", gap: 3,
              padding: "5px 8px",
              background: countInEnabled ? "#0a1a0a" : "transparent",
              border: `1px solid ${countInEnabled ? "#336633" : C.border}`,
              borderRadius: 4, flexShrink: 0,
            }}>
              <label style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer" }}>
                <input
                  type="checkbox"
                  checked={countInEnabled}
                  onChange={e => setCountInEnabled(e.target.checked)}
                  style={{ accentColor: C.green, cursor: "pointer", width: mobile ? 16 : 13, height: mobile ? 16 : 13 }}
                />
                <span style={{ fontSize: mobile ? 10 : 9, color: countInEnabled ? C.green : C.textFaint, letterSpacing: 1 }}>
                  COUNT IN
                </span>
              </label>
              {countInEnabled && (
                <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                  <select value={countInBeats} onChange={e => setCountInBeats(parseInt(e.target.value))}
                    style={{ ...selectStyle, width: mobile ? 52 : 42 }}>
                    <option value={2}>2</option>
                    <option value={3}>3</option>
                    <option value={4}>4</option>
                  </select>
                  <select value={countInDenom} onChange={e => setCountInDenom(parseInt(e.target.value))}
                    style={{ ...selectStyle, width: mobile ? 64 : 54 }}>
                    <option value={4}>4ths</option>
                    <option value={8}>8ths</option>
                  </select>
                </div>
              )}
            </div>

            {/* On mobile: measure number inline; on desktop it's at end */}
            {mobile && (
              <div style={{ marginLeft: "auto", textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>
                  {playing ? "NOW" : "M."}
                </div>
                {(() => {
                  const mn = playing ? currentMeasure : previewMeasure;
                  const ms = measures[mn];
                  const sig = ms ? `[${ms.numerator}/${ms.denominator}${ms.grouping ? " " + ms.grouping.join("+") : ""}]` : "";
                  return (
                    <div style={{ display: "flex", alignItems: "baseline", gap: 6, justifyContent: "flex-end" }}>
                      <span style={{ fontSize: 32, color: C.gold, fontWeight: "bold", lineHeight: 1 }}>{mn}</span>
                      <span style={{ fontSize: 32, color: C.gold, fontWeight: "bold", lineHeight: 1 }}>{sig}</span>
                    </div>
                  );
                })()}
                <div style={{ fontSize: 11, minHeight: "1.3em",
                  color: lastRM ? (lastRM.atCurrent ? C.gold : C.reh) : "transparent" }}>
                  {lastRM ? `[${lastRM.mark}]` : "·"}
                </div>
              </div>
            )}
          </div>

          {/* Second controls row: subdivision + tempo (mobile: separate row) */}
          <div style={{
            padding: mobile ? "6px 12px" : "0 20px 8px",
            borderBottom: mobile ? `1px solid ${C.border}` : "none",
            display: "flex", gap: mobile ? 8 : 18,
            alignItems: "flex-end", flexWrap: "wrap",
            background: C.bgMid, flexShrink: 0,
            ...(mobile ? {} : { paddingTop: 8 }),
            ...(portrait ? { overflowY: "auto", maxHeight: "38vh", WebkitOverflowScrolling: "touch" } : {}),
            ...(mobile && !portrait ? { flexShrink: 0 } : {}),
          }}>
            {/* Subdivision */}
            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
              <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>SUBDIVIDE</label>
              <select value={subdivIdx} onChange={e => setSubdivIdx(parseInt(e.target.value))}
                style={{ ...selectStyle, minWidth: mobile ? 160 : 180 }}>
                {SUBDIV_OPTIONS.map((o, i) => <option key={i} value={i}>{o.label}</option>)}
              </select>
            </div>

            {/* Rehearsal tempo */}
            <div style={{ display: "flex", flexDirection: "column", gap: 3, flex: mobile ? 1 : "unset" }}>
              <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>
                TEMPO &nbsp;
                <span style={{ color: C.gold, fontSize: 11 }}>{tempoScale}%</span>
                {previewMs && (
                  <span style={{ color: C.textDim, fontSize: 10 }}>
                    &nbsp;= {Math.round(previewMs.tempoBPM * tempoScale / 100)} bpm
                  </span>
                )}
              </label>
              <input type="range" min={10} max={150} step={1} value={tempoScale}
                onChange={e => setTempoScale(parseInt(e.target.value))}
                style={{ width: mobile ? "100%" : 160, accentColor: C.gold, cursor: "pointer" }}
              />
            </div>

            {/* Bluetooth latency offset */}
            {btLatency > 0 || (!portrait) ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>
                  BT OFFSET <span style={{ color: C.textDim, fontSize: 10 }}>{btLatency} ms</span>
                </label>
                <input type="range" min={0} max={300} step={10} value={btLatency}
                  onChange={e => setBtLatency(parseInt(e.target.value))}
                  style={{ width: mobile ? "100%" : 120, accentColor: C.unit, cursor: "pointer" }}
                />
              </div>
            ) : (
              <button onClick={() => setBtLatency(10)}
                style={{ background: "transparent", border: `1px solid ${C.border}`,
                  color: C.textFaint, borderRadius: 3, padding: "3px 7px",
                  cursor: "pointer", fontSize: 9, letterSpacing: 1, alignSelf: "flex-end",
                  marginBottom: 2 }}>
                BT OFFSET
              </button>
            )}

            {/* Desktop measure readout */}
            {!mobile && (
              <div style={{ marginLeft: "auto", textAlign: "right" }}>
                <div style={{ fontSize: 9, color: C.textFaint, letterSpacing: 2 }}>
                  {playing ? "PLAYING" : "MEASURE"}
                </div>
                {(() => {
                  const mn = playing ? currentMeasure : previewMeasure;
                  const ms = measures[mn];
                  const sig = ms ? `[${ms.numerator}/${ms.denominator}${ms.grouping ? " " + ms.grouping.join("+") : ""}]` : "";
                  return (
                    <div style={{ display: "flex", alignItems: "baseline", gap: 8, justifyContent: "flex-end" }}>
                      <span style={{ fontSize: 38, color: C.gold, fontWeight: "bold", lineHeight: 1 }}>{mn}</span>
                      <span style={{ fontSize: 38, color: C.gold, fontWeight: "bold", lineHeight: 1 }}>{sig}</span>
                    </div>
                  );
                })()}
                <div style={{ fontSize: 13, letterSpacing: 2, minHeight: "1.4em",
                  color: lastRM ? (lastRM.atCurrent ? C.gold : C.reh) : "transparent" }}>
                  {lastRM ? `[${lastRM.mark}]` : "·"}
                </div>
              </div>
            )}
          </div>

          {/* ── Pattern visualizer ── */}
          <div style={{
            padding: mobile ? "8px 12px" : "12px 20px",
            borderBottom: `1px solid ${C.border}`,
            background: C.bgDark, flexShrink: 0,
            ...(mobile && !portrait ? { flexShrink: 0 } : {}),
          }}>
            <div style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1, marginBottom: 8, display: "flex", alignItems: "baseline", gap: 6, flexWrap: "wrap" }}>
              <span>PATTERN</span>
              <span style={{ color: C.gold }}>
                m.{previewMeasure}
                {measures[previewMeasure]?.rehearsal && <span style={{ color: C.reh }}> [{measures[previewMeasure].rehearsal}]</span>}
              </span>
              {previewMs && (() => {
                const groups = getPrimaryGroups(previewMs);
                return (
                  <span style={{ color: C.textDim }}>
                    {groups.join("+")} × {previewMs.denominator === 2 ? "½" : previewMs.denominator === 4 ? "¼" : `1/${previewMs.denominator}`}
                    {" → "}{previewPattern.length} click{previewPattern.length !== 1 ? "s" : ""}
                  </span>
                );
              })()}
              {loopEnd !== null && <span style={{ color: C.orange }}>↺ m.{loopStart ?? startMeasure}–{loopEnd - 1}</span>}
            </div>
            <div style={{ display: "flex", gap: mobile ? 6 : 5, flexWrap: "wrap", alignItems: "center" }}>
              {previewPattern.map((tick, i) => {
                const isActive = i === activeBeat;
                const col =
                  tick.weight === 3 ? C.measure :
                  tick.weight === 2 ? C.primary  :
                  tick.weight === 1 ? C.unit     : C.sub;
                const sz = mobile
                  ? (tick.weight === 3 ? 34 : tick.weight === 2 ? 26 : tick.weight === 1 ? 18 : 11)
                  : (tick.weight === 3 ? 30 : tick.weight === 2 ? 22 : tick.weight === 1 ? 15 : 9);
                return (
                  <div key={i} style={{
                    width: sz, height: sz,
                    borderRadius: tick.weight >= 2 ? 4 : "50%",
                    background: isActive ? col : col + (theme === "light" ? "55" : "33"),
                    border: `1.5px solid ${col}${isActive ? "ff" : (theme === "light" ? "99" : "77")}`,
                    boxShadow: isActive ? `0 0 14px ${col}, 0 0 6px ${col}` : "none",
                    transition: "box-shadow 0.04s, background 0.04s",
                    flexShrink: 0,
                  }} />
                );
              })}
            </div>
          </div>

          {/* ── Timeline ── */}
          <div style={{ padding: mobile ? "8px 12px 4px" : "12px 20px 4px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div style={{ fontSize: 9, color: C.textFaint, marginBottom: 6 }}>
              {mobile
                ? "TIMELINE · tap = start · double-tap & drag = loop · 2-finger drag = scroll"
                : "TIMELINE · click = set start · drag = loop · shift-click = set loop end"}
            </div>

            {/* Outer scroll container */}
            <div
              ref={timelineScrollRef}
              style={{
                overflowX: "auto", overflowY: "visible",
                borderRadius: 4,
                scrollbarWidth: "thin",
                scrollbarColor: `${C.borderHi} ${C.bgDark}`,
                touchAction: "pan-x",
                WebkitOverflowScrolling: "touch",
              }}
            >
              {/* Inner track — fixed px width, one px per MIN_PX_PER_MEASURE per measure */}
              <div
                ref={timelineRef}
                onMouseDown={handleTimelineMouseDown}
                onTouchStart={handleTimelineTouchStart}
                onTouchMove={handleTimelineTouchMove}
                onTouchEnd={handleTimelineTouchEnd}
                style={{
                  position: "relative",
                  width: timelineContentWidth,
                  height: mobile ? 52 : 60,
                  background: C.bgDark,
                  border: `1px solid ${C.border}`,
                  borderRadius: 4,
                  cursor: "crosshair",
                }}
              >
                {/* Loop region */}
                {loopEnd !== null && (
                  <div style={{
                    position: "absolute",
                    left: measPx(loopStart ?? startMeasure),
                    width: Math.max(0, measPx(loopEnd + 1) - measPx(loopStart ?? startMeasure)),
                    top: 0, bottom: 0,
                    background: `${C.orange}20`,
                    borderLeft: `2px solid ${C.orange}`,
                    borderRight: `2px solid ${C.orange}`,
                    pointerEvents: "none",
                  }} />
                )}

                {/* Measure ticks — every measure gets a tick; labels thin out when crowded */}
                {Array.from({ length: totalMeasures }, (_, i) => i + 1).map(mn => {
                  const pxPerM = timelineContentWidth / Math.max(1, totalMeasures);
                  const labelStep = pxPerM < 30 ? Math.ceil(30 / pxPerM) : 1;
                  const showLabel = mn === 1 || mn % labelStep === 0;
                  return (
                    <div key={mn} style={{
                      position: "absolute", left: measPx(mn),
                      bottom: 0, height: showLabel ? 8 : 4, width: 1,
                      background: showLabel ? C.textDim : C.textFaint,
                      pointerEvents: "none",
                    }}>
                      {showLabel && (
                        <div style={{
                          position: "absolute", bottom: -14, left: "50%",
                          transform: "translateX(-50%)",
                          fontSize: 8, color: C.textFaint, whiteSpace: "nowrap",
                        }}>{mn}</div>
                      )}
                    </div>
                  );
                })}

                {/* Timeline events: rehearsal marks, time sig changes, Fine */}
                {timelineEvents.map((ev, idx) => {
                  const px = measPx(ev.measure);
                  const isReh = !!ev.rehearsal;
                  return (
                    <div key={idx} style={{ position: "absolute", left: px, top: 0, bottom: 0, pointerEvents: "none" }}>
                      <div style={{
                        position: "absolute", left: 0, top: 0, bottom: 0,
                        width: isReh ? 2 : 1,
                        background: ev.isFine ? C.text : isReh ? C.reh : (ev.barline === '||' || ev.barline === ':||' || ev.barline === '||:') ? C.textDim : C.borderHi,
                      }} />
                      <div style={{
                        position: "absolute", top: 3, left: 4,
                        fontSize: mobile ? 8 : 9, lineHeight: 1.4, whiteSpace: "nowrap",
                      }}>
                        {/* Line 1: rehearsal mark (or Fine) — fixed height so line 2 always aligns */}
                        <div style={{ fontWeight: "bold", fontSize: mobile ? 9 : 10,
                          color: ev.isFine ? C.measure : isReh ? C.reh : ev.directive ? C.primary : (ev.segno || ev.codaJump) ? C.unit : "transparent",
                          height: mobile ? 12 : 14, overflow: "hidden" }}>
                          {isReh ? `[${ev.rehearsal}]` : ev.isFine ? "‖" : ev.directive ? ev.directive.replace("DC_FINE","D.C. al Fine").replace("DC_CODA","D.C. al Coda").replace("DS_FINE","D.S. al Fine").replace("DS_CODA","D.S. al Coda").replace("FINE","Fine").replace("CODA","Coda") : ev.segno ? "$" : ev.codaJump ? "@" : " "}
                        </div>
                        {/* Line 2: time signature */}
                        <div style={{ color: C.textDim }}>
                          {ev.numerator}/{ev.denominator}
                        </div>
                        {/* Line 3: grouping */}
                        <div style={{ color: C.textFaint }}>
                          {ev.grouping ? `(${ev.grouping.join("+")})` : ""}
                        </div>
                      </div>
                    </div>
                  );
                })}

                {/* Playhead */}
                {playing && (
                  <div style={{
                    position: "absolute", left: measPx(currentMeasure),
                    top: -4, bottom: -4, width: 2,
                    background: C.measure, boxShadow: `0 0 8px ${C.measure}`,
                    pointerEvents: "none",
                  }}>
                    <div style={{
                      position: "absolute", top: 0, left: -4,
                      width: 0, height: 0,
                      borderLeft: "5px solid transparent",
                      borderRight: "5px solid transparent",
                      borderTop: `8px solid ${C.measure}`,
                    }} />
                  </div>
                )}

                {/* Start / loop-start marker */}
                <div style={{
                  position: "absolute", left: measPx(startMeasure),
                  top: -4, bottom: 0, width: 2,
                  background: loopEnd !== null ? C.orange : C.green,
                  pointerEvents: "none",
                }}>
                  <div style={{
                    position: "absolute", top: 0, left: -4,
                    width: 0, height: 0,
                    borderLeft: "5px solid transparent",
                    borderRight: "5px solid transparent",
                    borderTop: `8px solid ${loopEnd !== null ? C.orange : C.green}`,
                  }} />
                </div>
              </div>
            </div>

            {/* Ruler end labels */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16, padding: "0 2px" }}>
              <span style={{ fontSize: 9, color: C.textFaint }}>m.1</span>
              <span style={{ fontSize: 9, color: C.textFaint }}>m.{totalMeasures}</span>
            </div>
          </div>


          {/* ── Start/loop inputs ── */}
          <div style={{
            padding: mobile ? "6px 12px" : "8px 20px",
            borderBottom: `1px solid ${C.border}`,
            display: "flex", gap: mobile ? 10 : 20, alignItems: "center", flexWrap: "wrap",
            background: C.bgMid, flexShrink: 0,
          }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>START</label>
              <input type="number" min={1} max={totalMeasures} value={startMeasure}
                onChange={e => {
                  const v = Math.max(1, parseInt(e.target.value) || 1);
                  setStartMeasure(v);
                  if (!playing) setPreviewMeasure(v);
                }}
                style={{
                  background: C.bgDark, border: `1px solid ${C.border}`, color: C.text,
                  padding: mobile ? "6px 8px" : "4px 8px", width: 65,
                  fontFamily: "monospace", fontSize: 13, borderRadius: 3, outline: "none",
                }} />
            </div>
            {loopEnd !== null && (
              <>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>LOOP END</label>
                  <input type="number" min={startMeasure + 1} max={totalMeasures} value={loopEnd}
                    onChange={e => setLoopEnd(Math.max(startMeasure + 1, (parseInt(e.target.value) || startMeasure + 1)))}
                    style={{
                      background: C.bgDark, border: `1px solid ${C.border}`, color: C.text,
                      padding: mobile ? "6px 8px" : "4px 8px", width: 65,
                      fontFamily: "monospace", fontSize: 13, borderRadius: 3, outline: "none",
                    }} />
                </div>
                <button onClick={() => { setLoopStart(null); setLoopEnd(null); }} style={{
                  background: C.redDim, border: `1px solid #442222`, color: "#cc6666",
                  padding: mobile ? "8px 12px" : "4px 10px",
                  cursor: "pointer", borderRadius: 3,
                  fontSize: 11, letterSpacing: 1, fontFamily: "monospace",
                  marginTop: mobile ? 0 : 14,
                }}>CLEAR LOOP</button>
              </>
            )}
            <div style={{ marginLeft: "auto", fontSize: 10, color: C.textDim }}>
              {loopEnd !== null ? `↺ m.${loopStart ?? startMeasure}–${loopEnd}` : `start m.${startMeasure}`}
            </div>
          </div>

          {/* ── Measure grid ── */}
          <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden", padding: mobile ? "8px 12px" : "12px 20px", minHeight: 0, touchAction: "pan-y", WebkitOverflowScrolling: "touch", ...(mobile && !portrait ? { flex: "none", overflowY: "visible", minHeight: "unset" } : {}) }}>
            <div style={{ fontSize: 9, color: C.textFaint, letterSpacing: 2, marginBottom: 6 }}>MEASURES</div>
            <div style={{
              display: "grid",
              gridTemplateColumns: mobile
                ? "repeat(auto-fill, minmax(48px, 1fr))"
                : "repeat(auto-fill, minmax(58px, 1fr))",
              gap: mobile ? 3 : 3,
            }}>
              {Object.values(measures).filter(Boolean).map(ms => {
                const isActive = playing && ms.measureNumber === currentMeasure;
                const isPrev   = !playing && ms.measureNumber === previewMeasure;
                const isStart  = ms.measureNumber === startMeasure;
                const isLoopStart = loopStart !== null && ms.measureNumber === loopStart;
                const inLoop   = loopEnd !== null && ms.measureNumber >= (loopStart ?? startMeasure) && ms.measureNumber <= loopEnd;
                return (
                  <div key={ms.measureNumber}
                    onClick={() => {
                      setStartMeasure(ms.measureNumber);
                      setLoopStart(null);
                      setLoopEnd(null);
                      if (!playing) setPreviewMeasure(ms.measureNumber);
                    }}
                    style={{
                      padding: mobile ? "4px" : "3px 5px",
                      borderRadius: 3, cursor: "pointer",
                      minHeight: mobile ? 38 : 44,
                      background:
                        isActive ? `${C.gold}18` :
                        isPrev   ? `${C.unit}12` :
                        inLoop   ? `${C.orange}14` :
                        ms.isEnd ? C.redDim : C.bgDark,
                      border: `1px solid ${
                        isActive ? C.gold :
                        isPrev   ? `${C.unit}88` :
                        isStart  ? C.green :
                        ms.rehearsal ? C.reh :
                        inLoop ? `${C.orange}55` : C.border}`,
                    }}>
                    {/* Top row: measure number left, rehearsal mark top-right */}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div style={{ fontSize: 8, color: isActive ? C.gold : C.textFaint }}>
                        {ms.measureNumber}
                      </div>
                      {ms.rehearsal && (
                        <div style={{ fontSize: mobile ? 8 : 9, color: C.reh, fontWeight: "bold", lineHeight: 1 }}>
                          [{ms.rehearsal}]
                        </div>
                      )}
                    </div>
                    {/* Line 2: time signature — always present */}
                    <div style={{ fontSize: 8, color: C.textDim }}>
                      {ms.numerator}/{ms.denominator}
                    </div>
                    {/* Line 3: grouping — always reserve space so tiles stay same height */}
                    <div style={{ fontSize: 7, color: C.textFaint, minHeight: "1em" }}>{ms.grouping ? ms.grouping.join("+") : ""}</div>
                    {ms.isEnd && <div style={{ fontSize: 8, color: C.measure }}>‖</div>}
                    {ms.directive && <div style={{ fontSize: 7, color: C.primary, lineHeight: 1 }}>{ms.directive.replace('DC_FINE','D.C.aF').replace('DC_CODA','D.C.aC').replace('DS_FINE','D.S.aF').replace('DS_CODA','D.S.aC').replace('FINE','Fine').replace('CODA','Coda')}</div>}
                    {ms.segno && <div style={{ fontSize: 9, color: C.unit, fontWeight:'bold' }}>$</div>}
                    {ms.codaJump && <div style={{ fontSize: 9, color: C.unit, fontWeight:'bold' }}>@</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Metronome />);
  </script>
</body>
</html>
