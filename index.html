    input[type=range] { height: 4px; }

<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Parser ───────────────────────────────────────────────────────────────────

function parseScore(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l && !l.startsWith("//") && !l.startsWith("#"));
  const events = [];
  for (const line of lines) {
    // Support both "12: ..." and "[12]: ..." — bracketed measure number becomes a rehearsal mark
    const m = line.match(/^(\[?)(\d+)(\]?)\s*:\s*(.*)$/);
    if (!m) continue;
    const bracketed = m[1] === "[" && m[3] === "]";
    const measure = parseInt(m[2]);
    const rest = m[4].trim();
    if (/^fine$/i.test(rest)) { events.push({ measure, type: "fine" }); continue; }
    let remaining = rest;
    const event = { measure, type: "change" };
    // Bracketed measure number is the rehearsal mark; inline [X] overrides if also present
    if (bracketed) event.rehearsal = String(measure);
    const rehM = remaining.match(/^\[([^\]]+)\]/);
    if (rehM) { event.rehearsal = rehM[1]; remaining = remaining.slice(rehM[0].length).trim(); }
    const tsM = remaining.match(/(\d+)\/(\d+)/);
    if (tsM) {
      event.numerator = parseInt(tsM[1]);
      event.denominator = parseInt(tsM[2]);
      remaining = remaining.slice(remaining.indexOf(tsM[0]) + tsM[0].length).trim();
    }
    const grpM = remaining.match(/\(([0-9+]+)\)/);
    if (grpM) {
      event.grouping = grpM[1].split("+").map(Number);
      remaining = remaining.slice(remaining.indexOf(grpM[0]) + grpM[0].length).trim();
    }
    const tempoM = remaining.match(/1\/(\d+)(\.?)\s*=\s*(\d+)/);
    if (tempoM) { event.tempoDenom = parseInt(tempoM[1]); event.tempoDotted = tempoM[2] === "."; event.tempoBPM = parseInt(tempoM[3]); }
    if (event.rehearsal || event.numerator || event.tempoBPM) events.push(event);
  }
  events.sort((a, b) => a.measure - b.measure);
  let state = { numerator: 4, denominator: 4, grouping: null, tempoDenom: 4, tempoDotted: false, tempoBPM: 120 };
  const measures = [];
  let fineAt = Infinity;
  const changes = {};
  for (const ev of events) {
    if (ev.type === "fine") { fineAt = ev.measure; continue; }
    if (!changes[ev.measure]) changes[ev.measure] = {};
    if (ev.rehearsal)   changes[ev.measure].rehearsal   = ev.rehearsal;
    if (ev.numerator)   changes[ev.measure].numerator   = ev.numerator;
    if (ev.denominator) changes[ev.measure].denominator = ev.denominator;
    if (ev.grouping)    changes[ev.measure].grouping    = ev.grouping;
    if (ev.tempoBPM)  { changes[ev.measure].tempoDenom = ev.tempoDenom; changes[ev.measure].tempoDotted = ev.tempoDotted || false; changes[ev.measure].tempoBPM = ev.tempoBPM; }
  }
  const lastMeasure = fineAt < Infinity ? fineAt : Math.max(...Object.keys(changes).map(Number), 1) + 20;
  for (let mn = 1; mn <= lastMeasure; mn++) {
    if (changes[mn]) {
      const c = changes[mn];
      state = {
        numerator:   c.numerator   ?? state.numerator,
        denominator: c.denominator ?? state.denominator,
        grouping:    c.grouping    ?? (c.numerator ? null : state.grouping),
        tempoDenom:  c.tempoDenom  ?? state.tempoDenom,
        tempoDotted: c.tempoDotted ?? state.tempoDotted,
        tempoBPM:    c.tempoBPM   ?? state.tempoBPM,
        rehearsal:   c.rehearsal,
      };
    } else {
      state = { ...state, rehearsal: undefined };
    }
    measures[mn] = { ...state, measureNumber: mn, isFine: mn === fineAt };
  }
  return { measures, fineAt };
}

// ─── Beat Model ───────────────────────────────────────────────────────────────
//
// Primary groups (in denominator units):
//   2/2        → [1, 1]         (each half = 1 denom unit, denom=2)
//   2/4,3/4,4/4→ [1,1,...] each quarter = 1 denom unit
//   6/8,9/8,12/8 → groups of 3 eighths = dotted quarter
//   odd meters with explicit grouping → use grouping directly
//
// Subdivision target is a note value (denominator of a fraction: 4=quarter, 8=eighth, etc.)
// For a group of N denom-units, we add sub-ticks only if (targetDenom / msDenom * N) is integer.
// i.e. the group must divide evenly into the target note value grid.
//
// Example: 7/8 (2+2+3), target = quarters (4)
//   denom=8, so one denom-unit = 1/8 note.
//   A quarter note = 2 eighth-notes = 2 denom-units.
//   Group of 2: 2/2 = 1 → sub-divide into 1 part (no sub-ticks added — just the primary click)
//   Group of 3: 3/2 = 1.5 → not integer → no subdivision, keep as single click
//
// Example: 7/8 (2+2+3), target = eighths (8)
//   denom=8, so target unit = 1 denom-unit.
//   Group of 2: 2 sub-ticks. Group of 3: 3 sub-ticks.

function getPrimaryGroups(mState) {
  const { numerator, denominator, grouping } = mState;
  if (grouping) return grouping;
  // Compound: 6/8, 9/8, 12/8 → groups of 3
  if (denominator === 8 && numerator % 3 === 0) return Array(numerator / 3).fill(3);
  return Array(numerator).fill(1);
}

// subdivTargetDenom: the note value we want to subdivide to.
//   0  = primary beats only (no subdivision)
//   4  = quarters
//   8  = eighths
//   16 = sixteenths
//   32 = thirty-seconds
//
// For each primary group of size G denom-units:
//   numSubs = G * targetDenom / denominator  (target notes fitting in this group)
//   e.g. 4/4→8ths: G=1, numSubs=1*8/4=2  ✓   7/8 (2+2+3)→4ths: G=3, 3*4/8=1.5→1  ✓
//   If subDivisions is a positive integer > 0, click subDivisions times.
//   Otherwise, click once (the primary beat only).

function getBeatPattern(mState, subdivTargetDenom) {
  const { denominator } = mState;
  const groups = getPrimaryGroups(mState);

  // Build primary-start set (denom-unit index)
  const primaryStarts = new Set();
  let cur = 0;
  for (const g of groups) { primaryStarts.add(cur); cur += g; }

  if (subdivTargetDenom === 0) {
    // Primary beats only — one tick per group
    return groups.map((g, i) => ({
      weight: i === 0 ? 3 : 2,
      durationUnits: g,
    }));
  }

  // How many target-note subdivisions fit in one denom-unit?
  // One denom-unit = 1/denominator note-value.
  // One target note = 1/targetDenom note-value.
  // So one denom-unit = targetDenom/denominator target notes.
  // numSubs for a group of G denom-units = G * targetDenom / denominator.
  // e.g. 4/4 → 8ths: G=1, numSubs = 1 * 8/4 = 2  ✓
  // e.g. 7/8 (2+2+3) → 4ths: G=2, numSubs = 2*4/8 = 1 ✓; G=3, numSubs=1.5 → not int → 1 ✓

  const pattern = [];
  let unitPos = 0;

  groups.forEach((g, gi) => {
    const rawSubs = g * subdivTargetDenom / denominator;
    const numSubs = Number.isInteger(rawSubs) && rawSubs >= 1 ? rawSubs : 1;
    const subDurUnits = g / numSubs; // duration of each sub-tick in denom-units

    for (let s = 0; s < numSubs; s++) {
      const globalUnit = unitPos + s * subDurUnits;
      let weight;
      if (gi === 0 && s === 0)                       weight = 3; // measure downbeat
      else if (s === 0)                               weight = 2; // primary beat (group start)
      else if (Number.isInteger(globalUnit) && primaryStarts.has(Math.round(globalUnit))) weight = 2;
      else                                            weight = 1; // subdivision click
      pattern.push({ weight, durationUnits: subDurUnits });
    }
    unitPos += g;
  });

  return pattern;
}

// Seconds per one denominator unit
function oneDenomUnitSec(mState, tempoScale) {
  const { tempoBPM, tempoDenom, tempoDotted, denominator } = mState;
  // dotted note tempo: one beat = 1.5 × tempoDenom note-values
  const dotFactor = tempoDotted ? 1.5 : 1;
  return (tempoDenom / denominator) * dotFactor * (60 / (tempoBPM * tempoScale));
}

// ─── Timeline helpers ─────────────────────────────────────────────────────────

function getTimelineEvents(measures, fineAt) {
  const events = [];
  let prevSig = null;
  const mNums = Object.keys(measures).map(Number).filter(n => n >= 1).sort((a, b) => a - b);
  for (const mn of mNums) {
    const ms = measures[mn];
    if (!ms) continue;
    const sig = `${ms.numerator}/${ms.denominator}|${(ms.grouping || []).join(",")}|${ms.tempoBPM}`;
    if (ms.rehearsal || sig !== prevSig || mn === 1) {
      events.push({
        measure: mn,
        rehearsal: ms.rehearsal,
        numerator: ms.numerator,
        denominator: ms.denominator,
        grouping: ms.grouping,
        tempoBPM: ms.tempoBPM,
        isFine: ms.isFine,
      });
      prevSig = sig;
    }
  }
  return events;
}

// ─── Subdivision options ──────────────────────────────────────────────────────
// Each option: { label, targetDenom }
// targetDenom=0 means primary beats only

const SUBDIV_OPTIONS = [
  { label: "Primary beats",     targetDenom: 0  },
  { label: "Subdivided to 4ths", targetDenom: 4  },
  { label: "Subdivided to 8ths", targetDenom: 8  },
  { label: "Subdivided to 16ths",targetDenom: 16 },
  { label: "Subdivided to 32nds",targetDenom: 32 },
];

// ─── Color palettes ───────────────────────────────────────────────────────────

const PALETTES = {
  dark: {
    bg:         "#0d0d16",
    bgMid:      "#111120",
    bgDark:     "#080810",
    border:     "#252540",
    borderHi:   "#3a3a60",
    measure:    "#ff3333",   // 5.3:1 on bg
    primary:    "#ffaa00",   // 10.1:1 on bg
    unit:       "#00ccff",   // 10.2:1 on bg
    sub:        "#8888bb",   // 5.6:1 on bgMid  (was #7777aa ~4.4)
    gold:       "#f0c040",   // 11.3:1 on bg
    green:      "#44ee88",
    greenDim:   "#1a3328",
    red:        "#ee4444",
    redDim:     "#2a0e0e",
    orange:     "#ee9900",
    text:       "#e8e4f8",   // 15.5:1 on bg
    textDim:    "#9090c0",   // 6.2:1 on bgMid  (was #7070a0 ~4.0)
    textFaint:  "#7a7aaa",   // 4.6:1 on bgMid  (was #404060 ~2.0)
    code:       "#00cc88",   // 9.5:1 on bgDark  (was #007755 ~3.5)
  },
  light: {
    bg:         "#f5f0e8",
    bgMid:      "#ece6d8",
    bgDark:     "#ddd6c4",
    border:     "#b0a890",
    borderHi:   "#8a7e6a",
    measure:    "#b80e0e",   // 5.0:1 on bg, 4.7:1 on bgDark
    primary:    "#7a3e00",   // 7.4:1 on bg      (was #b06000 ~4.1)
    unit:       "#005580",   // 6.2:1 on bg       (was #006699 ~5.5, slightly adjusted)
    sub:        "#5e3d99",   // 7.1:1 on bg       (was #8866aa ~4.1)
    gold:       "#5e3f00",   // 8.5:1 on bg       (was #8a6000 ~4.9)
    green:      "#005c2a",
    greenDim:   "#c8ecd8",
    red:        "#bb1111",
    redDim:     "#f5d8d8",
    orange:     "#b85000",
    text:       "#1a1408",   // 16.1:1 on bg
    textDim:    "#3e3428",   // 10.1:1 on bg      (was #5a4e38 ~7.2, even stronger)
    textFaint:  "#5a4e38",   // 7.2:1 on bg       (was #9a8e78 ~2.8)
    code:       "#004d2a",   // 9.8:1 on bg
  },
};

// ─── Default score ────────────────────────────────────────────────────────────

const DEFAULT_SCORE = `1: 4/4, 1/4=90
12: [A]
17: 7/8 (2+2+3)
19: [B] 7/8 (3+2+2)
20: 7/8 (2+2+3)
24: 8/8 (3+3+2) 1/4=72
28: [C] 4/4
38: Fine`;

// ─── Main Component ───────────────────────────────────────────────────────────

function Metronome() {
  const [theme, setTheme]                   = useState("dark");
  const C = PALETTES[theme];
  const [scoreText, setScoreText]           = useState(DEFAULT_SCORE);
  const [parsed, setParsed]                 = useState(() => parseScore(DEFAULT_SCORE));
  const [playing, setPlaying]               = useState(false);
  const [currentMeasure, setCurrentMeasure] = useState(1);
  const [currentBeat, setCurrentBeat]       = useState(0);
  const [subdivIdx, setSubdivIdx]           = useState(0);
  const [startMeasure, setStartMeasure]     = useState(1);
  const [loopEnd, setLoopEnd]               = useState(null);
  const [tempoScale, setTempoScale]         = useState(100);
  const [parseError, setParseError]         = useState("");
  const [flash, setFlash]                   = useState(null);
  const [showScore, setShowScore]           = useState(false); // mobile score drawer
  const [showHelp, setShowHelp]             = useState(false);
  const [winWidth, setWinWidth]             = useState(800);
  const rootRef = useRef(null);
  useEffect(() => {
    if (!rootRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) setWinWidth(e.contentRect.width);
    });
    ro.observe(rootRef.current);
    return () => ro.disconnect();
  }, []);

  // Use 100dvh on iOS Safari (excludes browser chrome); fall back to 100vh
  useEffect(() => {
    if (!rootRef.current) return;
    try {
      rootRef.current.style.height = "100dvh";
    } catch (e) {
      rootRef.current.style.height = "100vh";
    }
  }, []);
  const mobile = winWidth < 640;
  // Which measure to preview in the pattern display (follows timeline hover/click when not playing)
  const [previewMeasure, setPreviewMeasure] = useState(1);
  // Count-in settings
  const [countInEnabled, setCountInEnabled] = useState(false);
  const [countInBeats, setCountInBeats]     = useState(4);   // 2, 3, or 4
  const [countInDenom, setCountInDenom]     = useState(4);   // 4 = quarters, 8 = eighths
  const [countingIn, setCountingIn]         = useState(false); // true while count-in is sounding
  const [countInRemaining, setCountInRemaining] = useState(0); // beats left in count-in

  const audioCtxRef      = useRef(null);
  const schedulerRef     = useRef(null);
  const posRef           = useRef({ measure: 1, tick: 0 });
  const nextTickTimeRef  = useRef(0);
  const isPlayingRef     = useRef(false);
  const parsedRef        = useRef(parsed);              parsedRef.current = parsed;
  const subdivIdxRef     = useRef(subdivIdx);           subdivIdxRef.current = subdivIdx;
  const tempoScaleRef    = useRef(tempoScale / 100);    tempoScaleRef.current = tempoScale / 100;
  const startMeasureRef  = useRef(startMeasure);        startMeasureRef.current = startMeasure;
  const loopEndRef       = useRef(loopEnd);             loopEndRef.current = loopEnd;

  const timelineRef       = useRef(null);   // inner content
  const timelineScrollRef = useRef(null);   // scroll container
  const dragStateRef        = useRef(null);
  const skipPlayEffectRef   = useRef(false);
  const countInEnabledRef = useRef(countInEnabled); countInEnabledRef.current = countInEnabled;
  const countInBeatsRef   = useRef(countInBeats);   countInBeatsRef.current = countInBeats;
  const countInDenomRef   = useRef(countInDenom);   countInDenomRef.current = countInDenom;

  // Keep previewMeasure in sync with currentMeasure while playing
  useEffect(() => {
    if (playing) setPreviewMeasure(currentMeasure);
  }, [playing, currentMeasure]);

  function getAudioCtx() {
    if (!audioCtxRef.current || audioCtxRef.current.state === "closed")
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtxRef.current.state === "suspended") audioCtxRef.current.resume();
    return audioCtxRef.current;
  }

  const scheduleNext = useCallback(() => {
    const ctx = audioCtxRef.current;
    if (!ctx || !isPlayingRef.current) return;
    const { measures, fineAt } = parsedRef.current;
    const scheduleUntil = ctx.currentTime + 0.15;

    while (nextTickTimeRef.current < scheduleUntil) {
      const { measure, tick } = posRef.current;
      const loopE = loopEndRef.current;

      if (loopE !== null && measure >= loopE) {
        posRef.current = { measure: startMeasureRef.current, tick: 0 };
        continue;
      }
      if (measure >= fineAt) {
        isPlayingRef.current = false;
        setPlaying(false);
        return;
      }

      const mState = measures[measure];
      if (!mState) { isPlayingRef.current = false; setPlaying(false); return; }

      const targetDenom = SUBDIV_OPTIONS[subdivIdxRef.current].targetDenom;
      const pattern     = getBeatPattern(mState, targetDenom);
      const tickIdx     = tick % pattern.length;
      const tickData    = pattern[tickIdx];
      const t           = nextTickTimeRef.current;

      // Audio click
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      const [freq, vol] =
        tickData.weight === 3 ? [1400, 0.80] :
        tickData.weight === 2 ? [950,  0.60] :
        tickData.weight === 1 ? [700,  0.40] :
                                [460,  0.15];
      osc.frequency.value = freq;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      osc.start(t); osc.stop(t + 0.07);

      // UI sync
      const delay = Math.max(0, (t - ctx.currentTime) * 1000);
      const [capM, capT, capW] = [measure, tickIdx, tickData.weight];
      setTimeout(() => {
        setCurrentMeasure(capM);
        setCurrentBeat(capT);
        setFlash(capW >= 3 ? "measure" : capW >= 2 ? "primary" : "unit");
      }, delay);

      if (tick + 1 >= pattern.length) posRef.current = { measure: measure + 1, tick: 0 };
      else posRef.current = { measure, tick: tick + 1 };

      nextTickTimeRef.current += tickData.durationUnits * oneDenomUnitSec(mState, tempoScaleRef.current);
    }
  }, []);

  useEffect(() => {
    if (!playing) {
      clearInterval(schedulerRef.current);
      isPlayingRef.current = false;
      setCountingIn(false);
      setCountInRemaining(0);
      return;
    }
    // Count-in path already set up the scheduler — don't double-start
    if (skipPlayEffectRef.current) {
      skipPlayEffectRef.current = false;
      return () => clearInterval(schedulerRef.current);
    }
    const ctx = getAudioCtx();
    nextTickTimeRef.current = ctx.currentTime + 0.05;
    isPlayingRef.current = true;
    scheduleNext();
    schedulerRef.current = setInterval(scheduleNext, 50);
    return () => clearInterval(schedulerRef.current);
  }, [playing, scheduleNext]);

  function handlePlay() {
    if (playing) { setPlaying(false); return; }

    const ctx = getAudioCtx();
    const realStart = Math.max(1, startMeasure);
    posRef.current = { measure: realStart, tick: 0 };
    setCurrentMeasure(realStart);
    setPreviewMeasure(realStart);
    setCurrentBeat(0);
    setFlash(null);

    // Schedule count-in if enabled
    if (countInEnabledRef.current) {
      const { measures } = parsedRef.current;
      const mState = measures[realStart] || measures[1];
      const scale = tempoScaleRef.current;
      // Duration of one count-in beat in seconds
      const ciDenom = countInDenomRef.current; // 4 or 8
      const ciBeats = countInBeatsRef.current; // 2,3,4
      // Use the measure's tempo: tempoBPM beats of 1/tempoDenom per minute
      const { tempoBPM, tempoDenom, tempoDotted } = mState;
      const oneBeatSec = (tempoDenom / ciDenom) * (60 / (tempoBPM * scale)); // count-in uses plain quarters/eighths

      const startT = ctx.currentTime + 0.05;
      setCountingIn(true);
      setCountInRemaining(ciBeats);

      for (let i = 0; i < ciBeats; i++) {
        const t = startT + i * oneBeatSec;
        // Schedule click
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        // First beat higher pitch
        osc.frequency.value = i === 0 ? 1400 : 1000;
        g.gain.setValueAtTime(i === 0 ? 0.7 : 0.5, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.06);

        // UI: show count-in beat number
        const capRemaining = ciBeats - i;
        setTimeout(() => {
          setCountingIn(true);
          setCountInRemaining(capRemaining);
          setFlash(i === 0 ? "measure" : "primary");
        }, Math.max(0, (t - ctx.currentTime) * 1000));
      }

      // Schedule end of count-in + start of score
      const scoreStartT = startT + ciBeats * oneBeatSec;
      setTimeout(() => {
        setCountingIn(false);
        setCountInRemaining(0);
      }, Math.max(0, (scoreStartT - ctx.currentTime) * 1000));

      // Start scheduler from scoreStartT
      nextTickTimeRef.current = scoreStartT;
      isPlayingRef.current = true;
      scheduleNext();
      schedulerRef.current = setInterval(scheduleNext, 50);
      // Mark as playing (use a flag to skip the useEffect double-start)
      skipPlayEffectRef.current = true;
      setPlaying(true);
    } else {
      setPlaying(true);
    }
  }

  function handleParse() {
    try {
      const p = parseScore(scoreText);
      setParsed(p);
      setParseError("");
      setStartMeasure(1);
      setPreviewMeasure(1);
      setLoopEnd(null);
    } catch (e) { setParseError(e.message); }
  }

  // ── Timeline ──────────────────────────────────────────────────────────────

  const { measures, fineAt } = parsed;
  const totalMeasures = fineAt < Infinity ? fineAt : Object.values(measures).filter(Boolean).length;
  const MIN_PX_PER_MEASURE = 22;
  const timelineContentWidth = Math.max(totalMeasures * MIN_PX_PER_MEASURE, 200);
  const measPx = (mn) => Math.round(((mn - 1) / Math.max(1, totalMeasures - 1)) * (timelineContentWidth - 1));
  const measPct = (mn) => ((mn - 1) / Math.max(1, totalMeasures - 1)) * 100;

  function measureFromX(x) {
    const scrollEl = timelineScrollRef.current;
    const rect = scrollEl.getBoundingClientRect();
    const px = (x - rect.left) + scrollEl.scrollLeft;
    const frac = Math.max(0, Math.min(1, px / Math.max(1, timelineContentWidth - 1)));
    return Math.max(1, Math.min(totalMeasures, Math.round(frac * (totalMeasures - 1)) + 1));
  }

  function handleTimelineMouseDown(e) {
    e.preventDefault();
    const mn = measureFromX(e.clientX);
    if (e.shiftKey) {
      if (mn > startMeasure) setLoopEnd(mn + 1);
    } else {
      dragStateRef.current = { anchorMn: mn };
      setStartMeasure(mn);
      setPreviewMeasure(mn);
      setLoopEnd(null);
      // Reposition playback immediately if playing
      if (isPlayingRef.current) {
        posRef.current = { measure: mn, tick: 0 };
        setCurrentMeasure(mn);
        setCurrentBeat(0);
      }
    }
  }

  function handleTimelineMouseMove(e) {
    if (!dragStateRef.current) return;
    const { anchorMn } = dragStateRef.current;
    const mn = measureFromX(e.clientX);
    if (mn !== anchorMn) {
      const lo = Math.min(anchorMn, mn);
      const hi = Math.max(anchorMn, mn);
      setStartMeasure(lo);
      setPreviewMeasure(lo);
      setLoopEnd(hi + 1);
    }
  }

  function handleTimelineMouseUp() {
    dragStateRef.current = null;
  }

  function handleTimelineTouchStart(e) {
    // Two-finger touch = scroll — don't intercept, let the container pan
    if (e.touches.length >= 2) {
      dragStateRef.current = null;
      return;
    }
    // Single finger: record start; decide drag vs tap on move/end
    const touch = e.touches[0];
    const mn = measureFromX(touch.clientX);
    dragStateRef.current = { anchorMn: mn, startX: touch.clientX, startY: touch.clientY, confirmed: false };
  }

  function handleTimelineTouchMove(e) {
    // If a second finger appears mid-gesture, abort the drag and let it scroll
    if (e.touches.length >= 2) {
      dragStateRef.current = null;
      return;
    }
    if (!dragStateRef.current) return;
    const touch = e.touches[0];
    const { anchorMn, startX, startY, confirmed } = dragStateRef.current;
    const dx = Math.abs(touch.clientX - startX);
    const dy = Math.abs(touch.clientY - startY);

    if (!confirmed) {
      if (dx < 6 && dy < 6) return;
      if (dy > dx) {
        dragStateRef.current = null;
        return;
      }
      // Confirmed horizontal drag — take control
      dragStateRef.current.confirmed = true;
      setStartMeasure(anchorMn);
      setPreviewMeasure(anchorMn);
      setLoopEnd(null);
      if (isPlayingRef.current) {
        posRef.current = { measure: anchorMn, tick: 0 };
        setCurrentMeasure(anchorMn);
        setCurrentBeat(0);
      }
    }

    e.preventDefault();
    const mn = measureFromX(touch.clientX);
    if (mn !== anchorMn) {
      const lo = Math.min(anchorMn, mn);
      const hi = Math.max(anchorMn, mn);
      setStartMeasure(lo);
      setPreviewMeasure(lo);
      setLoopEnd(hi + 1);
    }
  }

  function handleTimelineTouchEnd(e) {
    if (!dragStateRef.current) return;
    const { anchorMn, confirmed } = dragStateRef.current;
    if (!confirmed) {
      // Short tap — set start position
      setStartMeasure(anchorMn);
      setPreviewMeasure(anchorMn);
      setLoopEnd(null);
      if (isPlayingRef.current) {
        posRef.current = { measure: anchorMn, tick: 0 };
        setCurrentMeasure(anchorMn);
        setCurrentBeat(0);
      }
    }
    dragStateRef.current = null;
  }

  useEffect(() => {
    window.addEventListener("mousemove", handleTimelineMouseMove);
    window.addEventListener("mouseup", handleTimelineMouseUp);
    return () => {
      window.removeEventListener("mousemove", handleTimelineMouseMove);
      window.removeEventListener("mouseup", handleTimelineMouseUp);
    };
  }, [playing, startMeasure]);

  // Auto-scroll timeline to keep playhead / start marker in view
  useEffect(() => {
    const scrollEl = timelineScrollRef.current;
    if (!scrollEl) return;
    const targetMn = playing ? currentMeasure : startMeasure;
    const px = measPx(targetMn);
    const vw = scrollEl.clientWidth;
    const sl = scrollEl.scrollLeft;
    const margin = Math.max(40, vw * 0.2);
    if (px < sl + margin)          scrollEl.scrollLeft = Math.max(0, px - margin);
    else if (px > sl + vw - margin) scrollEl.scrollLeft = px - vw + margin;
  }, [currentMeasure, startMeasure, playing]);

  // ── Derived display ───────────────────────────────────────────────────────

  const timelineEvents = getTimelineEvents(measures, fineAt);
  const targetDenom    = SUBDIV_OPTIONS[subdivIdx].targetDenom;
  const previewMs      = measures[previewMeasure] || measures[startMeasure] || measures[1];
  const previewPattern = previewMs ? getBeatPattern(previewMs, targetDenom) : [];
  const activeBeat     = playing && previewMeasure === currentMeasure ? currentBeat : -1;

  const flashColors = { measure: C.measure, primary: C.primary, unit: C.unit };

  // ── Render ────────────────────────────────────────────────────────────────

      <button onClick={() => { handleParse(); if (mobile) setShowScore(false); }} style={{

      {!mobile && <>

          {[

            <div key={label} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>

              <span style={{ fontSize: 11, color: C.textDim }}>{label}</span>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 10, color: C.textFaint, lineHeight: 1.7, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>
          <span style={{ color: C.textDim }}>Format: </span>
          m: [mark] N/D (g+r+p) 1/D=BPM
        </div>
      </>}
    </div>
  );

  return (

      fontFamily: "'Courier New', monospace",
      display: "flex", flexDirection: "column", userSelect: "none",
      overflow: "hidden",
    }}>

      {/* ── Header ── */}
      <div style={{
        borderBottom: `1px solid ${C.border}`,

        display: "flex", alignItems: "center", gap: 10,
        background: C.bgMid, flexShrink: 0,
      }}>
        {mobile && (
          <button onClick={() => setShowScore(true)} style={{
            background: "transparent", border: `1px solid ${C.border}`,

        <button

          style={{

        {/* ? help button */}
        <button

          {/* Controls bar */}

            padding: mobile ? "8px 12px" : "12px 20px",

              cursor: "pointer", borderRadius: 4,

                {(() => {

                  return (

                      <span style={{ fontSize: 32, color: C.gold, fontWeight: "bold", lineHeight: 1 }}>{mn}</span>
                      <span style={{ fontSize: 32, color: C.gold, fontWeight: "bold", lineHeight: 1 }}>{sig}</span>
                    </div>

                })()}
                {(() => {
                  const ms = measures[playing ? currentMeasure : previewMeasure];
                  return ms?.rehearsal
                    ? <div style={{ fontSize: 11, color: "#88aaff" }}>[{ms.rehearsal}]</div>
                    : null;
                })()}
              </div>
            )}
          </div>

          {/* Second controls row: subdivision + tempo (mobile: separate row) */}
          <div style={{
            padding: mobile ? "6px 12px" : "0 20px 8px",
            borderBottom: mobile ? `1px solid ${C.border}` : "none",
            display: "flex", gap: mobile ? 8 : 18,
            alignItems: "flex-end", flexWrap: "wrap",
            background: C.bgMid, flexShrink: 0,
            ...(mobile ? {} : { paddingTop: 8 }),
          }}>
            {/* Subdivision */}
            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
              <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>SUBDIVIDE</label>
              <select value={subdivIdx} onChange={e => setSubdivIdx(parseInt(e.target.value))}
                style={{ ...selectStyle, minWidth: mobile ? 160 : 180 }}>
                {SUBDIV_OPTIONS.map((o, i) => <option key={i} value={i}>{o.label}</option>)}
              </select>
            </div>

            {/* Rehearsal tempo */}
            <div style={{ display: "flex", flexDirection: "column", gap: 3, flex: mobile ? 1 : "unset" }}>

                <span style={{ color: C.gold, fontSize: 11 }}>{tempoScale}%</span>
                {previewMs && (
                  <span style={{ color: C.textDim, fontSize: 10 }}>

                  </span>

              </label>

            </div>

            {/* Desktop measure readout */}
            {!mobile && (
              <div style={{ marginLeft: "auto", textAlign: "right" }}>

                  {playing ? "PLAYING" : "MEASURE"}
                </div>
                {(() => {
                  const mn = playing ? currentMeasure : previewMeasure;
                  const ms = measures[mn];
                  const sig = ms ? `[${ms.numerator}/${ms.denominator}${ms.grouping ? " " + ms.grouping.join("+") : ""}]` : "";
                  return (
                    <div style={{ display: "flex", alignItems: "baseline", gap: 8, justifyContent: "flex-end" }}>
                      <span style={{ fontSize: 38, color: C.gold, fontWeight: "bold", lineHeight: 1 }}>{mn}</span>

          {/* ── Pattern visualizer ── */}
          <div style={{

                  }} />
                );
              })}
            </div>
          </div>

          {/* ── Timeline ── */}
          <div style={{ padding: mobile ? "8px 12px 4px" : "12px 20px 4px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div style={{ fontSize: 9, color: C.textFaint, marginBottom: 6 }}>
              {mobile
                ? "TIMELINE · tap = start · 1-finger drag = loop · 2-finger drag = scroll"
                : "TIMELINE · click = set start · drag = loop · shift-click = set loop end"}
            </div>

            {/* Outer scroll container */}
            <div
              ref={timelineScrollRef}
              style={{
                overflowX: "auto", overflowY: "visible",
                borderRadius: 4,
                scrollbarWidth: "thin",
                scrollbarColor: `${C.borderHi} ${C.bgDark}`,
                touchAction: "pan-x",
                WebkitOverflowScrolling: "touch",
              }}
            >
              {/* Inner track — fixed px width, one px per MIN_PX_PER_MEASURE per measure */}
              <div
                ref={timelineRef}
                onMouseDown={handleTimelineMouseDown}
                onTouchStart={handleTimelineTouchStart}
                onTouchMove={handleTimelineTouchMove}
                onTouchEnd={handleTimelineTouchEnd}
                style={{
                  position: "relative",
                  width: timelineContentWidth,
                  height: mobile ? 52 : 60,
                  background: C.bgDark,
                  border: `1px solid ${C.border}`,
                  borderRadius: 4,
                  cursor: "crosshair",
                }}
              >
                {/* Loop region */}
                {loopEnd !== null && (
                  <div style={{
                    position: "absolute",
                    left: measPx(startMeasure),
                    width: Math.max(0, measPx(loopEnd) - measPx(startMeasure)),
                    top: 0, bottom: 0,
                    background: `${C.orange}20`,
                    borderLeft: `2px solid ${C.orange}`,
                    borderRight: `2px solid ${C.orange}`,
                    pointerEvents: "none",
                  }} />
                )}

                {/* Measure ticks — every measure gets a tick; labels thin out when crowded */}
                {Array.from({ length: totalMeasures }, (_, i) => i + 1).map(mn => {
                  const pxPerM = timelineContentWidth / Math.max(1, totalMeasures);
                  const labelStep = pxPerM < 30 ? Math.ceil(30 / pxPerM) : 1;
                  const showLabel = mn === 1 || mn % labelStep === 0;
                  return (
                    <div key={mn} style={{
                      position: "absolute", left: measPx(mn),
                      bottom: 0, height: showLabel ? 8 : 4, width: 1,
                      background: showLabel ? C.textDim : C.textFaint,
                      pointerEvents: "none",
                    }}>
                      {showLabel && (
                        <div style={{
                          position: "absolute", bottom: -14, left: "50%",
                          transform: "translateX(-50%)",
                          fontSize: 8, color: C.textFaint, whiteSpace: "nowrap",
                        }}>{mn}</div>
                      )}
                    </div>
                  );
                })}

                {/* Timeline events: rehearsal marks, time sig changes, Fine */}
                {timelineEvents.map((ev, idx) => {
                  const px = measPx(ev.measure);
                  const isReh = !!ev.rehearsal;
                  return (
                    <div key={idx} style={{ position: "absolute", left: px, top: 0, bottom: 0, pointerEvents: "none" }}>
                      <div style={{
                        position: "absolute", left: 0, top: 0, bottom: 0,
                        width: isReh ? 2 : 1,
                        background: ev.isFine ? C.measure : isReh ? "#88aaff" : C.borderHi,
                      }} />
                      <div style={{
                        position: "absolute", top: 3, left: 4,
                        fontSize: mobile ? 8 : 9, lineHeight: 1.5, whiteSpace: "nowrap",
                        color: ev.isFine ? C.measure : isReh ? "#aabbff" : C.textDim,
                      }}>
                        {isReh && <div style={{ fontWeight: "bold", fontSize: mobile ? 9 : 10, color: "#aaccff" }}>[{ev.rehearsal}]</div>}
                        <div>{ev.numerator}/{ev.denominator}{ev.grouping ? ` (${ev.grouping.join("+")})` : ""}</div>
                        {ev.isFine && <div style={{ color: C.measure }}>Fine</div>}
                      </div>
                    </div>
                  );
                })}

                {/* Playhead */}
                {playing && (
                  <div style={{
                    position: "absolute", left: measPx(currentMeasure),
                    top: -4, bottom: -4, width: 2,
                    background: C.measure, boxShadow: `0 0 8px ${C.measure}`,
                    pointerEvents: "none",
                  }}>
                    <div style={{
                      position: "absolute", top: 0, left: -4,
                      width: 0, height: 0,
                      borderLeft: "5px solid transparent",
                      borderRight: "5px solid transparent",
                      borderTop: `8px solid ${C.measure}`,
                    }} />
                  </div>
                )}

                {/* Start / loop-start marker */}
                <div style={{
                  position: "absolute", left: measPx(startMeasure),
                  top: -4, bottom: 0, width: 2,
                  background: loopEnd !== null ? C.orange : C.green,
                  pointerEvents: "none",
                }}>
                  <div style={{
                    position: "absolute", top: 0, left: -4,
                    width: 0, height: 0,
                    borderLeft: "5px solid transparent",
                    borderRight: "5px solid transparent",
                    borderTop: `8px solid ${loopEnd !== null ? C.orange : C.green}`,
                  }} />
                </div>
              </div>
            </div>

            {/* Ruler end labels */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16, padding: "0 2px" }}>
              <span style={{ fontSize: 9, color: C.textFaint }}>m.1</span>
              <span style={{ fontSize: 9, color: C.textFaint }}>m.{totalMeasures}</span>
            </div>
          </div>


          {/* ── Start/loop inputs ── */}
          <div style={{
            padding: mobile ? "6px 12px" : "8px 20px",
            borderBottom: `1px solid ${C.border}`,
            display: "flex", gap: mobile ? 10 : 20, alignItems: "center", flexWrap: "wrap",
            background: C.bgMid, flexShrink: 0,
          }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>START</label>
              <input type="number" min={1} max={totalMeasures} value={startMeasure}
                onChange={e => {
                  const v = Math.max(1, parseInt(e.target.value) || 1);
                  setStartMeasure(v);
                  if (!playing) setPreviewMeasure(v);
                }}
                style={{
                  background: C.bgDark, border: `1px solid ${C.border}`, color: C.text,
                  padding: mobile ? "6px 8px" : "4px 8px", width: 65,
                  fontFamily: "monospace", fontSize: 13, borderRadius: 3, outline: "none",
                }} />
            </div>
            {loopEnd !== null && (
              <>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                  <label style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1 }}>LOOP END</label>
                  <input type="number" min={startMeasure + 1} max={totalMeasures} value={loopEnd - 1}
                    onChange={e => setLoopEnd(Math.max(startMeasure + 1, (parseInt(e.target.value) || startMeasure + 1)))}
                    style={{
                      background: C.bgDark, border: `1px solid ${C.border}`, color: C.text,
                      padding: mobile ? "6px 8px" : "4px 8px", width: 65,
                      fontFamily: "monospace", fontSize: 13, borderRadius: 3, outline: "none",
                    }} />
                </div>
                <button onClick={() => setLoopEnd(null)} style={{
                  background: C.redDim, border: `1px solid #442222`, color: "#cc6666",
                  padding: mobile ? "8px 12px" : "4px 10px",
                  cursor: "pointer", borderRadius: 3,
                  fontSize: 11, letterSpacing: 1, fontFamily: "monospace",
                  marginTop: mobile ? 0 : 14,
                }}>CLEAR LOOP</button>
              </>
            )}
            <div style={{ marginLeft: "auto", fontSize: 10, color: C.textDim }}>
              {loopEnd !== null ? `↺ m.${startMeasure}–${loopEnd - 1}` : `start m.${startMeasure}`}
            </div>
          </div>

          {/* ── Measure grid ── */}
          <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden", padding: mobile ? "8px 12px" : "12px 20px", minHeight: 0, touchAction: "pan-y", WebkitOverflowScrolling: "touch" }}>
            <div style={{ fontSize: 9, color: C.textFaint, letterSpacing: 2, marginBottom: 6 }}>MEASURES</div>
            <div style={{
              display: "grid",
              gridTemplateColumns: mobile
                ? "repeat(auto-fill, minmax(48px, 1fr))"
                : "repeat(auto-fill, minmax(58px, 1fr))",
              gap: mobile ? 3 : 3,
            }}>
              {Object.values(measures).filter(Boolean).map(ms => {
                const isActive = playing && ms.measureNumber === currentMeasure;
                const isPrev   = !playing && ms.measureNumber === previewMeasure;
                const isStart  = ms.measureNumber === startMeasure;
                const inLoop   = loopEnd !== null && ms.measureNumber >= startMeasure && ms.measureNumber < loopEnd;
                return (
                  <div key={ms.measureNumber}
                    onClick={() => {
                      setStartMeasure(ms.measureNumber);
                      setLoopEnd(null);
                      if (!playing) setPreviewMeasure(ms.measureNumber);
                    }}
                    style={{
                      padding: mobile ? "4px" : "3px 5px",
                      borderRadius: 3, cursor: "pointer",
                      minHeight: mobile ? 38 : 44,
                      background:
                        isActive ? `${C.gold}18` :
                        isPrev   ? `${C.unit}12` :
                        inLoop   ? `${C.orange}14` :
                        ms.isFine? "#220a0a" : C.bgDark,
                      border: `1px solid ${
                        isActive ? C.gold :
                        isPrev   ? `${C.unit}88` :
                        isStart  ? C.green :
                        ms.rehearsal ? "#5577cc" :
                        inLoop ? `${C.orange}55` : C.border}`,
                    }}>
                    <div style={{ fontSize: 8, color: isActive ? C.gold : C.textFaint }}>
                      {ms.measureNumber}
                    </div>
                    {ms.rehearsal && (
                      <div style={{ fontSize: mobile ? 9 : 10, color: "#88aaff", fontWeight: "bold" }}>
                        [{ms.rehearsal}]
                      </div>
                    )}
                    <div style={{ fontSize: 8, color: C.textDim }}>
                      {ms.numerator}/{ms.denominator}
                    </div>
                    {ms.grouping && !mobile && (
                      <div style={{ fontSize: 7, color: C.textFaint }}>{ms.grouping.join("+")}</div>
                    )}
                    {ms.isFine && <div style={{ fontSize: 8, color: C.measure }}>Fine</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Metronome />);
  </script>
</body>
</html>
